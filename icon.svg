<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#5b8c74"/>
  <!-- open book -->
  <rect x="90" y="170" width="148" height="172" rx="14" fill="rgba(255,255,255,0.18)"/>
  <rect x="274" y="170" width="148" height="172" rx="14" fill="rgba(255,255,255,0.18)"/>
  <!-- spine line -->
  <rect x="248" y="165" width="16" height="182" rx="8" fill="rgba(255,255,255,0.35)"/>
  <!-- lines on left page -->
  <rect x="112" y="210" width="104" height="10" rx="5" fill="rgba(255,255,255,0.7)"/>
  <rect x="112" y="234" width="80" height="10" rx="5" fill="rgba(255,255,255,0.5)"/>
  <rect x="112" y="258" width="96" height="10" rx="5" fill="rgba(255,255,255,0.5)"/>
  <rect x="112" y="282" width="68" height="10" rx="5" fill="rgba(255,255,255,0.4)"/>
  <!-- headphone arc on right page -->
  <path d="M294 278 a62 62 0 0 1 124 0" stroke="rgba(255,255,255,0.85)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <rect x="288" y="278" width="18" height="30" rx="9" fill="rgba(255,255,255,0.85)"/>
  <rect x="406" y="278" width="18" height="30" rx="9" fill="rgba(255,255,255,0.85)"/>
  <!-- pencil beneath book -->
  <rect x="180" y="360" width="152" height="22" rx="11" fill="rgba(255,255,255,0.6)" transform="rotate(-8 256 371)"/>
  <polygon points="324,350 344,368 320,372" fill="rgba(255,255,255,0.8)" transform="rotate(-8 334 361)"/>
</svg>
