// ── STATE ──
const STORAGE_KEY = 'grammar_progress_v1';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
// state[id] = {fill:score, error:score, trans:score, done:bool}

let currentRule = null, currentMode = 'fill', exIndex = 0, exAnswered = false, sessionScore = [];

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)) }
function getRule(id){ return GRAMMAR.find(r=>r.id===id) }
function ruleState(id){ if(!state[id]) state[id]={fill:0,error:0,trans:0,done:false}; return state[id] }

const LEVEL_META = {
  A1:{label:'A1 — Beginner',ar:'مبتدئ',desc:'Articles, verb to be, present simple…',arDesc:'المقالات، فعل to be، المضارع البسيط…',color:'#2a7a55'},
  A2:{label:'A2 — Elementary',ar:'أساسي',desc:'Past simple, future, comparatives…',arDesc:'الماضي البسيط، المستقبل، المقارنة…',color:'#3558b0'},
  B1:{label:'B1 — Intermediate',ar:'متوسط',desc:'Present perfect, passives, conditionals…',arDesc:'المضارع التام، المبني للمجهول، الشرط…',color:'#a07020'},
  B2:{label:'B2 — Upper Intermediate',ar:'فوق المتوسط',desc:'Past perfect, reported speech, phrasal verbs…',arDesc:'الماضي التام، الكلام غير المباشر، الأفعال المركبة…',color:'#b03030'},
  C1:{label:'C1 — Advanced',ar:'متقدم',desc:'Inversion, cleft sentences, subjunctive…',arDesc:'القلب، الجمل المشقوقة، المضارع الشرطي…',color:'#6030a0'},
};

// ── HOME ──
function buildHome(){
  const levels = ['A1','A2','B1','B2','C1'];
  const list = document.getElementById('level-list');
  list.innerHTML = '';
  let doneTotal = 0;
  levels.forEach((lv,i)=>{
    const rules = GRAMMAR.filter(r=>r.level===lv);
    const done = rules.filter(r=>ruleState(r.id).done).length;
    doneTotal += done;
    const card = document.createElement('div');
    card.className = `level-card lv-${lv}`;
    card.style.animationDelay = (i*.06)+'s';
    const pct = Math.round(done/rules.length*100);
    card.innerHTML = `
      <div class="level-head" onclick="toggleLevel(this.parentElement,'${lv}')">
        <div class="level-badge">${lv}</div>
        <div class="level-info">
          <div class="level-name">${LEVEL_META[lv].label} <span class="level-name-ar">— ${LEVEL_META[lv].ar}</span></div>
          <div class="level-desc">${LEVEL_META[lv].desc} <span class="level-desc-ar">${LEVEL_META[lv].arDesc}</span></div>
        </div>
        <div class="level-count">${done}/${rules.length}</div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="level-rules">${rules.map(r=>`<span class="rule-chip" onclick="event.stopPropagation();openRule(${r.id})"><span class="chip-en">${r.icon} ${r.title} ${ruleState(r.id).done?'<span class=done-check>✓</span>':''}</span><span class="chip-ar">${r.arabic}</span></span>`).join('')}</div>
    `;
    list.appendChild(card);
  });
  document.getElementById('stat-done').textContent = doneTotal;
  document.getElementById('stat-pct').textContent = Math.round(doneTotal/GRAMMAR.length*100)+'%';
}

function toggleLevel(card, lv){
  card.classList.toggle('open');
}

function showHome(){
  document.getElementById('home').classList.add('active');
  document.getElementById('detail').classList.remove('active');
  buildHome();
}

// ── RULE DETAIL ──
function openRule(id){
  currentRule = getRule(id);
  currentMode = 'fill';
  exIndex = 0; sessionScore = [];
  renderDetail();
  document.getElementById('home').classList.remove('active');
  document.getElementById('detail').classList.add('active');
  window.scrollTo(0,0);
}

function renderDetail(){
  const r = currentRule;
  document.getElementById('detail-nav-title').textContent = r.title;
  const lvlEl = document.getElementById('detail-nav-lvl');
  lvlEl.textContent = r.level; lvlEl.className = 'detail-nav-lvl lv-'+r.level;
  document.getElementById('r-icon').textContent = r.icon;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-subtitle').textContent = r.subtitle;
  document.getElementById('r-arabic').textContent = r.arabic;
  document.getElementById('r-formula').textContent = r.formula;
  document.getElementById('r-explanation').innerHTML = r.explanation;
  document.getElementById('r-examples').innerHTML = r.examples.map(e=>`<li>${e}</li>`).join('');
  document.getElementById('rule-hero').className = 'rule-hero lv-'+r.level;
  // reset mode tabs
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  renderEx();
}

function setMode(m, el){
  currentMode = m; exIndex = 0; sessionScore = [];
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderEx();
}

function getItems(){ return currentRule[currentMode] || [] }

function renderEx(){
  const items = getItems();
  if(exIndex >= items.length){ renderComplete(); return; }
  exAnswered = false;
  updateScoreDots();

  const item = items[exIndex];
  const area = document.getElementById('exercise-area');
  area.innerHTML = '';

  if(currentMode === 'fill'){
    renderFill(item, area);
  } else if(currentMode === 'error'){
    renderError(item, area);
  } else {
    renderTrans(item, area);
  }
  area.innerHTML += `<div class="ex-nav">
    <span class="ex-counter">${exIndex+1} / ${items.length}</span>
    <button class="btn btn-ghost" id="btn-hint" onclick="showHint()">💡 Hint</button>
    <button class="btn btn-primary" id="btn-check" onclick="checkAnswer()">Check</button>
  </div>`;
}

function renderFill(item, area){
  const q = item.q.replace('___', '<span style="color:var(--accent);font-weight:700">___</span>');
  area.innerHTML = `
    <div class="ex-q">${q}</div>
    <input class="ex-input" id="ex-ans" placeholder="Type your answer..." autocomplete="off" onkeydown="if(event.key==='Enter')checkAnswer()">
    <div class="hint-text" id="hint-text"></div>
    <div class="feedback-box" id="feedback-box"></div>
  `;
  setTimeout(()=>document.getElementById('ex-ans')?.focus(),50);
}

function renderError(item, area){
  const words = item.q.split(' ');
  let selectedIdx = -1;
  const wbtns = words.map((w,i)=>`<button class="word-btn" data-i="${i}" onclick="selectWord(this,${i})">${w}</button>`).join(' ');
  area.innerHTML = `
    <div class="section-label" style="margin-bottom:8px">Click the word(s) that contain an error:</div>
    <div class="sentence-hunt" id="hunt-sentence">${wbtns}</div>
    <div class="hint-text" id="hint-text"></div>
    <div class="feedback-box" id="feedback-box"></div>
  `;
  window._huntSelected = -1;
}

function selectWord(el, idx){
  if(exAnswered) return;
  document.querySelectorAll('.word-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  window._huntSelected = idx;
}

function renderTrans(item, area){
  area.innerHTML = `
    <div class="section-label" style="margin-bottom:8px">Translate this Arabic sentence to English:</div>
    <div class="ex-ar">${item.ar}</div>
    <input class="ex-input" id="ex-ans" placeholder="Type in English..." autocomplete="off" onkeydown="if(event.key==='Enter')checkAnswer()">
    <div class="hint-text" id="hint-text"></div>
    <div class="feedback-box" id="feedback-box"></div>
  `;
  setTimeout(()=>document.getElementById('ex-ans')?.focus(),50);
}

function showHint(){
  const item = getItems()[exIndex];
  const el = document.getElementById('hint-text');
  if(el) el.textContent = '💡 ' + item.h;
}

function normalize(s){ return s.trim().toLowerCase().replace(/[.,!?''"]/g,'').replace(/\s+/g,' ') }

function checkAnswer(){
  if(exAnswered) return;
  const item = getItems()[exIndex];
  let correct = false;

  if(currentMode === 'fill' || currentMode === 'trans'){
    const inp = document.getElementById('ex-ans');
    if(!inp) return;
    const val = inp.value.trim();
    if(!val){ document.getElementById('hint-text').textContent = 'Please type an answer first.'; return; }
    // accept multiple correct answers separated by /
    const accepted = item.a.split('/').map(a=>normalize(a));
    correct = accepted.includes(normalize(val));
    inp.classList.add(correct?'correct':'wrong');
    if(currentMode === 'fill'){
      showFeedback(correct, item.a, val);
    } else {
      showFeedback(correct, item.a, val);
    }
  } else if(currentMode === 'error'){
    if(window._huntSelected < 0){ document.getElementById('hint-text').textContent = 'Click a word first.'; return; }
    const words = item.q.split(' ');
    const correctWord = item.a.toLowerCase();
    const selected = words[window._huntSelected].toLowerCase().replace(/[.,!?]/g,'');
    // check if selected word is part of the correct answer region
    correct = item.a.toLowerCase().includes(selected) || selected.includes(correctWord.split(' ')[0]);
    const btn = document.querySelector(`.word-btn[data-i="${window._huntSelected}"]`);
    if(btn) btn.classList.add(correct?'correct-pick':'wrong-pick');
    // highlight the actual error region
    const ansWords = item.a.toLowerCase().split(' ');
    document.querySelectorAll('.word-btn').forEach(b=>{
      const w = b.textContent.toLowerCase().replace(/[.,!?]/g,'');
      if(ansWords.some(aw=>aw.includes(w)||w.includes(aw))) b.classList.add('correct-pick');
    });
    showFeedback(correct, 'Correct phrase: "' + item.a + '"', '');
  }

  exAnswered = true;
  sessionScore.push(correct);
  updateScoreDots();
  document.getElementById('btn-check').textContent = 'Next →';
  document.getElementById('btn-check').onclick = nextEx;
}

function showFeedback(correct, answer, given){
  const box = document.getElementById('feedback-box');
  if(!box) return;
  box.className = 'feedback-box ' + (correct?'correct':'wrong');
  if(correct){ playCorrectSound(); box.textContent = '✓ Correct! Well done.' }
  else { playWrongSound(); box.innerHTML = '✗ Not quite.<br>Correct answer: <strong>' + answer + '</strong>' }
}

function nextEx(){
  exIndex++;
  renderEx();
}

function updateScoreDots(){
  const items = getItems();
  const el = document.getElementById('ex-score');
  el.innerHTML = items.map((_,i)=>{
    let cls = 'dot';
    if(i < sessionScore.length) cls += sessionScore[i]?' ok':' bad';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderComplete(){
  const total = sessionScore.length;
  const ok = sessionScore.filter(Boolean).length;
  const pct = total ? Math.round(ok/total*100) : 0;
  const circ = 2*Math.PI*36;
  const offset = circ - (circ * pct/100);

  // mark done if >60%
  if(pct >= 60){
    ruleState(currentRule.id).done = true;
    ruleState(currentRule.id)[currentMode] = pct;
    save();
  }

  const area = document.getElementById('exercise-area');
  area.innerHTML = `
    <div class="complete-card">
      <div class="score-ring">
        <svg viewBox="0 0 80 80" width="90" height="90">
          <circle class="ring-bg" cx="40" cy="40" r="36"/>
          <circle class="ring-fill" cx="40" cy="40" r="36" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke="${pct>=60?'var(--success)':'var(--warning)'}"/>
        </svg>
        <div class="score-pct" style="color:${pct>=60?'var(--success)':'var(--warning)'}">${pct}%</div>
      </div>
      <div class="complete-icon">${pct>=80?'🏆':pct>=60?'👍':'📖'}</div>
      <div class="complete-title">${pct>=80?'Excellent!':pct>=60?'Good job!':'Keep practising!'}</div>
      <div class="complete-sub">${ok} / ${total} correct · ${pct>=60?'Rule marked complete ✓':pct+'% – try again for 60%+'}</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="restartMode()">🔄 Retry</button>
        <button class="btn btn-primary" onclick="showHome()">← Back to Rules</button>
      </div>
    </div>
  `;
}

function restartMode(){ exIndex=0; sessionScore=[]; renderEx(); }


// ══════════════════════════════════════
//  SOUND EFFECTS (Web Audio API)
// ══════════════════════════════════════
let _audioCtx = null;
function _ctx(){
  if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}
function playCorrectSound(){
  const ctx=_ctx();
  [[523.25,0],[659.25,0.13]].forEach(([freq,delay])=>{
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sine'; osc.frequency.value=freq;
    const t=ctx.currentTime+delay;
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(0.28,t+0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
    osc.start(t); osc.stop(t+0.55);
  });
}
function playWrongSound(){
  const ctx=_ctx();
  [[220,0],[180,0.14]].forEach(([freq,delay])=>{
    const osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type='sawtooth'; osc.frequency.value=freq;
    const t=ctx.currentTime+delay;
    gain.gain.setValueAtTime(0.18,t);
    gain.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
    osc.start(t); osc.stop(t+0.12);
  });
}

// INIT
buildHome();
</script>
