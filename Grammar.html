<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Grammar">
<meta name="theme-color" content="#3a7ab8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>English Grammar — Interactive Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf8f5; --bg-2:#f3ede4; --surface:#ffffff; --surface-2:#fdf9f6;
  --accent:#3a7ab8; --accent-tint:#d9eaf5; --accent-deep:#1e4d78;
  --success:#3d8f68; --success-tint:#e8f5ef; --error:#c04848; --error-tint:#fdeaea;
  --warning:#c09030; --warning-tint:#fdf3dc;
  --text:#1a2535; --text-2:#4a5e75; --text-3:#8a9bb0;
  --border:#dce6f0; --border-2:#b8cce0;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
  --font-ar:'Amiri',serif;
  --r-sm:6px; --r-md:12px; --r-lg:20px; --r-xl:28px; --r-full:9999px;
  --shadow-sm:0 2px 8px rgba(26,37,53,.07);
  --shadow-md:0 6px 20px rgba(26,37,53,.1);
  --ease-out:cubic-bezier(.25,.46,.45,.94);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.94)}60%{transform:scale(1.03)}100%{transform:scale(1)}}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── HOME ── */
#home{background:#f5f0e8}
.home-header{background:#fff;border-bottom:1px solid #ede6d9;padding:18px 20px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.btn-home{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:1.5px solid #ddd;border-radius:var(--r-full);font-family:var(--font-body);font-size:.82rem;font-weight:600;color:var(--text-2);text-decoration:none;transition:all .15s;flex-shrink:0}
.btn-home:hover{border-color:var(--accent);color:var(--accent)}
.home-header-title{flex:1;text-align:center}
.home-title{font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:var(--text);line-height:1}
.home-subtitle{font-size:.72rem;color:var(--text-3);margin-top:2px}
.home-progress-pill{background:var(--accent-tint);color:var(--accent-deep);border-radius:var(--r-full);padding:5px 12px;font-size:.75rem;font-weight:600;white-space:nowrap}
/* level grid */
.lv-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:20px 16px 80px;max-width:760px;margin:0 auto}
.lv-card{background:#fff;border-radius:20px;border:1px solid #e8dfd0;padding:20px 18px 16px;cursor:pointer;transition:transform .2s var(--ease-out),box-shadow .2s var(--ease-out);animation:fadeUp .4s var(--ease-out) both;position:relative;display:flex;flex-direction:column;gap:6px}
.lv-card:nth-child(2){animation-delay:.05s}.lv-card:nth-child(3){animation-delay:.1s}.lv-card:nth-child(4){animation-delay:.15s}.lv-card:nth-child(5){animation-delay:.2s}
.lv-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(80,60,30,.12)}
.lv-card:active{transform:scale(.97)}
.lv-tag{position:absolute;top:16px;right:16px;padding:4px 10px;border-radius:8px;font-size:.75rem;font-weight:700;letter-spacing:.03em}
.lv-A1 .lv-tag{background:#dcf2e6;color:#1e7a45}
.lv-A2 .lv-tag{background:#fdeede;color:#c05c10}
.lv-B1 .lv-tag{background:#fde8e8;color:#b02020}
.lv-B2 .lv-tag{background:#ede8fd;color:#5828a0}
.lv-C1 .lv-tag{background:#fde8f4;color:#a02070}
.lv-name-ar{font-family:'Amiri',serif;font-size:2rem;line-height:1.2;direction:rtl;text-align:right;margin-top:28px;color:var(--text)}
.lv-en-label{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.lv-A1 .lv-en-label{color:#1e7a45}.lv-A2 .lv-en-label{color:#c05c10}
.lv-B1 .lv-en-label{color:#b02020}.lv-B2 .lv-en-label{color:#5828a0}
.lv-C1 .lv-en-label{color:#a02070}
.lv-desc-ar{font-family:'Amiri',serif;font-size:.88rem;color:var(--text-3);direction:rtl;text-align:right;line-height:1.5;flex:1}
.lv-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid #f0e8dc}
.lv-count{font-size:.75rem;color:var(--text-3)}
.lv-btn{border:none;border-radius:var(--r-full);padding:6px 14px;font-family:var(--font-body);font-size:.78rem;font-weight:600;cursor:pointer;color:#fff;transition:opacity .15s}
.lv-btn:hover{opacity:.85}
.lv-A1 .lv-btn{background:#2a9a56}.lv-A2 .lv-btn{background:#d0640e}
.lv-B1 .lv-btn{background:#b82828}.lv-B2 .lv-btn{background:#6030b0}
.lv-C1 .lv-btn{background:#b02878}
/* C1 full-width card */
.lv-card.lv-wide{grid-column:1/-1;flex-direction:row;align-items:center;gap:20px;padding:18px 22px}
.lv-card.lv-wide .lv-name-ar{font-size:1.75rem;margin-top:0}
.lv-card.lv-wide .lv-desc-ar{flex:1}
.lv-card.lv-wide .lv-footer{border-top:none;padding-top:0;margin-top:0;flex-direction:column;align-items:flex-end;gap:6px;min-width:120px}
/* rules list screen */
#rules-list{background:#f5f0e8}
.rl-nav{background:#fff;border-bottom:1px solid #ede6d9;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.rl-title{font-weight:600;font-size:.95rem;flex:1}
.rl-level-badge{padding:4px 10px;border-radius:8px;font-size:.75rem;font-weight:700}
.rl-body{max-width:620px;margin:0 auto;padding:20px 16px 80px;display:flex;flex-direction:column;gap:10px}
.rule-item{background:#fff;border:1px solid #e8dfd0;border-radius:14px;padding:14px 16px;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:center;gap:14px;animation:fadeUp .35s var(--ease-out) both}
.rule-item:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(80,60,30,.1)}
.rule-item:active{transform:scale(.98)}
.rule-item-icon{font-size:1.4rem;flex-shrink:0}
.rule-item-info{flex:1}
.rule-item-en{font-size:.9rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.rule-item-ar{font-family:'Amiri',serif;font-size:.88rem;color:var(--text-3);direction:rtl}
.rule-item-done{color:var(--success);font-size:.85rem}
.rule-item-arrow{color:var(--text-3);font-size:.9rem}
/* stats pills */
.home-stats{display:flex;gap:10px;padding:14px 16px 0;max-width:760px;margin:0 auto}
.stat-pill{background:#fff;border:1px solid #e8dfd0;border-radius:var(--r-full);padding:7px 16px;font-size:.8rem;font-weight:600;color:var(--text-2);display:flex;align-items:center;gap:6px}
.stat-pill span{color:var(--accent);font-weight:700;font-size:.9rem}
/* remove old */
.levels-wrap,.levels-heading,.level-card,.level-head,.level-badge,.level-info,.level-name,.level-desc,.level-count,.level-rules,.rule-chip,.chip-en,.chip-ar,.done-check,.progress-bar-wrap,.progress-bar-fill,.stats-bar,.stat,.stat-n,.stat-l,.home-badge,.home-subtitle-ar,.level-name-ar,.level-desc-ar{}

/* ── RULE DETAIL ── */
#detail{background:var(--bg)}
.detail-nav{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1.5px solid var(--border);border-radius:var(--r-full);font-size:.82rem;font-weight:600;cursor:pointer;background:var(--bg);color:var(--text);transition:all .15s}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.detail-nav-title{font-weight:600;font-size:.92rem;flex:1}
.detail-nav-lvl{font-size:.75rem;font-weight:600;padding:4px 10px;border-radius:var(--r-full);letter-spacing:.05em}
.lv-A1 .detail-nav-lvl,.detail-nav-lvl.lv-A1{background:#e8f5ef;color:#2a7a55}
.lv-A2 .detail-nav-lvl,.detail-nav-lvl.lv-A2{background:#e8f0fb;color:#3558b0}
.lv-B1 .detail-nav-lvl,.detail-nav-lvl.lv-B1{background:#fdf3dc;color:#a07020}
.lv-B2 .detail-nav-lvl,.detail-nav-lvl.lv-B2{background:#fdeaea;color:#b03030}
.lv-C1 .detail-nav-lvl,.detail-nav-lvl.lv-C1{background:#f0e8fb;color:#6030a0}
.detail-body{max-width:680px;margin:0 auto;padding:28px 20px 100px}
/* ── RULE HERO PREMIUM ── */
.rule-hero{color:#fff;border-radius:22px;padding:26px 26px 22px;margin-bottom:22px;animation:fadeUp .4s var(--ease-out) both;position:relative;overflow:hidden;min-height:148px}
.rule-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:rgba(255,255,255,.07);border-radius:50%;pointer-events:none}
.rule-hero::after{content:'';position:absolute;bottom:-40px;right:20px;width:110px;height:110px;background:rgba(255,255,255,.06);border-radius:50%;pointer-events:none}
.hero-deco{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:5.5rem;opacity:.1;pointer-events:none;line-height:1;user-select:none}
.hero-stars{position:absolute;top:14px;right:22px;font-size:.55rem;letter-spacing:7px;opacity:.35;pointer-events:none}
.rule-icon-wrap{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;background:rgba(255,255,255,.2);border-radius:50%;margin-bottom:14px;font-size:1.3rem;backdrop-filter:blur(4px)}
.rule-title{font-family:var(--font-display);font-size:1.7rem;font-weight:700;line-height:1.1;margin-bottom:6px}
.rule-underline{width:36px;height:2.5px;background:rgba(255,255,255,.45);border-radius:2px;margin:6px 0 8px}
.rule-subtitle{opacity:.75;font-size:.88rem;margin-bottom:14px}
.rule-arabic{display:inline-flex;align-items:center;padding:5px 14px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:9999px;font-family:'Amiri',serif;font-size:.95rem;direction:rtl;white-space:nowrap}
/* Level gradients */
.rule-hero.lv-A1{background:linear-gradient(145deg,#0d4225 0%,#1a7a40 55%,#14a055 100%)}
.rule-hero.lv-A2{background:linear-gradient(145deg,#6a2008 0%,#b84820 55%,#d86825 100%)}
.rule-hero.lv-B1{background:linear-gradient(145deg,#0f2870 0%,#2248c0 55%,#1870d0 100%)}
.rule-hero.lv-B2{background:linear-gradient(145deg,#50082a 0%,#981845 55%,#b82860 100%)}
.rule-hero.lv-C1{background:linear-gradient(145deg,#240855 0%,#4820a0 55%,#5828c8 100%)}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;margin-bottom:16px;animation:fadeUp .4s var(--ease-out) both}
.section-label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
.formula-box{background:var(--bg-2);border-radius:var(--r-md);padding:12px 16px;font-family:'Courier New',monospace;font-size:.88rem;color:var(--accent-deep);line-height:1.6}
.explanation-text{font-size:.95rem;line-height:1.65;color:var(--text-2)}
.explanation-text{padding:0!important}
.expl-line{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);direction:rtl;flex-wrap:wrap}
.expl-line:last-child{border-bottom:none}
.expl-ctx{flex:1;text-align:right;color:var(--text-2);font-size:.92rem;line-height:1.5}
.expl-arrow{color:var(--accent);font-size:1.1rem;font-weight:700;flex-shrink:0;direction:ltr}
.key-term{display:inline-flex;align-items:center;background:var(--accent-tint);color:var(--accent-deep);font-weight:700;font-family:'JetBrains Mono','Fira Code',monospace;padding:3px 11px;border-radius:6px;border:1.5px solid var(--accent);font-size:.85em;direction:ltr;white-space:nowrap}
.examples-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.examples-list li{background:var(--bg);border-left:3px solid var(--accent);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:9px 14px;font-size:.9rem;line-height:1.5}
.examples-list li b{color:var(--accent-deep)}
/* mode tabs */
.mode-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.mode-tab{flex:1;min-width:90px;padding:10px 8px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:.8rem;font-weight:600;cursor:pointer;text-align:center;background:var(--bg);transition:all .15s}
.mode-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mode-tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}
/* exercises */
.exercise-area{min-height:280px}
.ex-q{font-size:1rem;line-height:1.65;margin-bottom:20px;color:var(--text)}
.ex-ar{font-family:var(--font-ar);font-size:1.15rem;direction:rtl;text-align:right;background:var(--bg-2);border-radius:var(--r-md);padding:14px 16px;margin-bottom:20px;color:var(--text);line-height:1.8}
.ex-input{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:var(--r-md);font-family:var(--font-body);font-size:.95rem;background:var(--bg);color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s}
.ex-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
.ex-input.correct{border-color:var(--success);background:var(--success-tint)}
.ex-input.wrong{border-color:var(--error);background:var(--error-tint)}
.hint-text{font-size:.8rem;color:var(--text-3);margin-top:6px;min-height:18px}
.feedback-box{border-radius:var(--r-md);padding:12px 16px;margin-top:12px;font-size:.88rem;line-height:1.5;display:none}
.feedback-box.correct{background:var(--success-tint);color:#1d6645;display:block}
.feedback-box.wrong{background:var(--error-tint);color:#8c2020;display:block}
.ex-nav{display:flex;align-items:center;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-prev:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.start-practice-wrap{display:flex;justify-content:center;padding:32px 20px 16px}
.start-practice-btn{font-size:1rem;padding:14px 36px;border-radius:var(--r-full);box-shadow:var(--shadow-accent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:var(--r-full);font-family:var(--font-body);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(58,122,184,.3)}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{background:var(--bg-2);color:var(--text);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.ex-counter{font-size:.82rem;color:var(--text-3);font-weight:500}
.ex-score{display:flex;gap:4px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.dot.ok{background:var(--success)}
.dot.bad{background:var(--error)}
/* error-hunt specific */
.sentence-hunt{font-size:1rem;line-height:1.9;padding:14px 16px;background:var(--bg);border-radius:var(--r-md);border:1.5px solid var(--border);margin-bottom:16px}
.word-btn{display:inline;padding:2px 3px;border-radius:4px;cursor:pointer;transition:background .12s;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit}
.word-btn:hover{background:var(--accent-tint)}
.word-btn.selected{background:var(--warning-tint);border-bottom:2px solid var(--warning)}
.word-btn.correct-pick{background:var(--success-tint);border-bottom:2px solid var(--success)}
.word-btn.wrong-pick{background:var(--error-tint);border-bottom:2px solid var(--error)}
/* word-drag (trans mode) */
.answer-zone{min-height:54px;border:2px dashed var(--border);border-radius:var(--r-md);padding:10px 12px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;background:var(--bg);transition:border-color .2s,background .2s}
.answer-zone.has-words{border-color:var(--accent);border-style:solid;background:var(--surface)}
.ans-placeholder{color:var(--text-3);font-size:.88rem;font-style:italic;width:100%;text-align:center}
.word-pool{display:flex;flex-wrap:wrap;gap:8px;padding:14px 12px;background:var(--bg-2);border-radius:var(--r-md);margin-bottom:14px;min-height:54px;align-items:center}
.word-tile{display:inline-flex;align-items:center;padding:7px 14px;border-radius:var(--r-full);font-family:inherit;font-size:.92rem;font-weight:500;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .12s,background .12s,opacity .15s,width .15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.pool-tile{background:var(--surface);border:1.5px solid var(--border-2);color:var(--text);box-shadow:var(--shadow-xs)}
.pool-tile:not(.used):hover{background:var(--accent-tint);border-color:var(--accent);transform:translateY(-2px)}
.pool-tile:not(.used):active{transform:scale(.93)}
.pool-tile.used{opacity:0;pointer-events:none;width:0;padding:0;margin:0;border:none;min-width:0}
.ans-tile{background:var(--accent);color:#fff;border:1.5px solid var(--accent-deep);box-shadow:0 2px 6px rgba(58,122,184,.25)}
.ans-tile:hover{opacity:.88;transform:translateY(-1px)}
.ans-tile:active{transform:scale(.93)}
.ans-tile.correct-tile{background:var(--success)!important;box-shadow:none}
.ans-tile.wrong-tile{background:var(--error)!important;box-shadow:none}
/* quick pick sentence + blank */
.quick-sentence{font-size:1.05rem;line-height:1.75;padding:14px 16px;background:var(--bg);border-radius:var(--r-md);border:1.5px solid var(--border);margin-bottom:14px;color:var(--text)}
.qblank{display:inline-block;min-width:70px;border-bottom:2.5px solid var(--accent);color:var(--accent);font-weight:700;text-align:center;padding:0 4px;margin:0 2px}
/* quick pick choices */
.quick-pick-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.quick-card{display:flex;align-items:flex-start;gap:14px;width:100%;padding:16px 18px;border-radius:var(--r-lg);border:2px solid var(--border);background:var(--surface);cursor:pointer;text-align:left;font-family:inherit;font-size:1rem;line-height:1.6;color:var(--text);transition:border-color .15s,background .15s,transform .1s}
.quick-card:hover:not(:disabled){border-color:var(--accent);background:var(--accent-tint);transform:translateY(-1px)}
.quick-card:active:not(:disabled){transform:scale(.98)}
.quick-card:disabled{cursor:default}
.quick-card.qcard-correct{border-color:var(--success);background:var(--success-tint);color:#1d6645}
.quick-card.qcard-wrong{border-color:var(--error);background:var(--error-tint);color:#8c2020;opacity:.75}
.qcard-letter{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--accent-tint);color:var(--accent-deep);font-weight:700;font-size:.82rem;display:flex;align-items:center;justify-content:center;margin-top:2px}
.quick-card.qcard-correct .qcard-letter{background:var(--success-tint);color:#1d6645}
.quick-card.qcard-wrong .qcard-letter{background:var(--error-tint);color:#8c2020}
/* complete screen */
.complete-card{background:var(--surface);border-radius:var(--r-xl);padding:36px 28px;text-align:center;box-shadow:var(--shadow-md);animation:pop .4s var(--ease-spring) both}
.complete-icon{font-size:3rem;margin-bottom:14px}
.complete-title{font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:8px}
.complete-sub{color:var(--text-2);font-size:.92rem;margin-bottom:24px}
.score-ring{width:90px;height:90px;margin:0 auto 20px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:8}
.score-ring .ring-fill{fill:none;stroke:var(--success);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease-out)}
.score-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--success)}

/* ── OVERALL PROGRESS TOAST ── */

function renderExpl(html){
  if(!html) return '';
  // Split explanation into parts by Arabic comma or period+space
  html = html.trim().replace(/\.$/,'');
  const parts = html.split(/\.\s+|[،,]\s*/).map(p=>p.trim()).filter(Boolean);
  return parts.map(part=>{
    // remove leading connectors
    part = part.replace(/^(استخدم|و|أو)\s+/,'').trim();
    if(!part) return '';
    const terms = [];
    const ctx = part.replace(/<b>(.*?)<\/b>/g,(_,t)=>{ terms.push(t); return ''; }).trim();
    if(!terms.length) return `<div class="expl-line"><span class="expl-ctx">${ctx}</span></div>`;
    const badge = `<span class="key-term">${terms.join(' / ')}</span>`;
    if(!ctx) return `<div class="expl-line">${badge}</div>`;
    return `<div class="expl-line"><span class="expl-ctx">${ctx}</span><span class="expl-arrow">←</span>${badge}</div>`;
  }).join('');
}

// ── Quick Pick helpers ──
function _lev(s1, s2){
  const m=s1.length, n=s2.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j?j:i));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=s1[i-1]===s2[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function findWrongPhrase(qWords, a){
  const ARTICLES = new Set(['the','a','an']);
  const TOBE     = new Set(['is','are','am','was','were','be','been','being']);
  const DO_VRB   = new Set(['do',"don't",'does',"doesn't",'did',"didn't"]);
  const HAVE_VRB = new Set(['have','has','had',"haven't","hasn't","hadn't"]);
  const cl = w => w.toLowerCase().replace(/[.,!?'"«»]/g,'');
  const cleaned = qWords.map(cl);
  const aWords = a.split(' ');
  const aLow = aWords.map(w=>w.toLowerCase());
  const n = aWords.length;
  const aS = aLow[0];

  // Multi-word
  if(n > 1){
    let bestPos=0, bestScore=-1, bestRn=n;
    for(let i=0;i<=qWords.length-n;i++){
      let s=0; for(let j=0;j<n;j++) if(cleaned[i+j]===aLow[j]) s++;
      if(s>bestScore){bestScore=s;bestPos=i;bestRn=n;}
    }
    const suffix=aLow.slice(1), m=suffix.length;
    if(m>0){
      for(let i=0;i<=qWords.length-m;i++){
        let s=0; for(let j=0;j<m;j++) if(cleaned[i+j]===suffix[j]) s++;
        if(s>bestScore||(s===bestScore&&m<bestRn)){bestScore=s;bestPos=i;bestRn=m;}
      }
    }
    return {pos:bestPos, count:bestRn};
  }

  // Single word — confusion classes
  for(const cls of [ARTICLES, TOBE, DO_VRB, HAVE_VRB]){
    if(cls.has(aS)){
      for(let i=0;i<cleaned.length;i++)
        if(cls.has(cleaned[i])&&cleaned[i]!==aS) return {pos:i,count:1};
    }
  }
  // Verb 3PS heuristic
  if(!aS.endsWith('s')&&!aS.endsWith('ed')&&!aS.endsWith('ing')){
    for(let i=0;i<cleaned.length;i++){
      const w=cleaned[i];
      if(w!==aS&&(w===aS+'s'||w===aS+'es'||w===aS.slice(0,-1)+'ies'))
        return {pos:i,count:1};
    }
  }
  // Edit distance fallback (prefer longer candidate)
  let bi=0,bd=999,bl=0;
  for(let i=0;i<cleaned.length;i++){
    if(cleaned[i]===aS) continue;
    const d=_lev(cleaned[i],aS);
    if(d<bd||(d===bd&&cleaned[i].length>bl)){bd=d;bi=i;bl=cleaned[i].length;}
  }
  return {pos:bi, count:1};
}


function getDistractor(correctAns, visibleWords, allItems, curIdx){
  const cLow = correctAns.toLowerCase().replace(/[.,!?'"]/g,'');
  const visLow = visibleWords.map(w=>w.toLowerCase().replace(/[.,!?'"]/g,''));
  // Try other error items in same rule for a clean distractor
  for(let i=0;i<allItems.length;i++){
    if(i===curIdx) continue;
    try{
      const oQ=allItems[i].q.split(' ');
      const {pos:op,count:oc}=findWrongPhrase(oQ,allItems[i].a);
      const cand=oQ.slice(op,op+oc).join(' ');
      const candL=cand.toLowerCase().replace(/[.,!?'"]/g,'');
      if(candL!==cLow && candL.length>0 && !visLow.some(v=>v===candL)) return cand;
    }catch(e){}
  }
  // Grammar confusion-class fallback
  const FB={
    a:['an','the'],an:['a','the'],the:['a','an'],
    is:['are','was','were'],are:['is','was'],am:['is','are'],
    was:['were','is'],were:['was','is'],
    have:['has','had'],has:['have','had'],had:['have','has'],
    do:['does','did'],does:['do','did'],did:['do','does'],
    will:['would','can','shall'],would:['will','could','might'],
    can:['could','will','may'],could:['can','would','might'],
    go:['goes','went'],goes:['go','went'],went:['go','goes'],
    be:['been','being'],been:['be','was'],being:['been','be'],
    which:['who','whom'],who:['which','that'],that:['which','who'],
    much:['many','some'],many:['much','some'],some:['any','much'],
    already:['yet','still'],yet:['already','still'],since:['for','during'],
    for:['since','during'],at:['in','on'],in:['at','on'],on:['at','in'],
    good:['well','better'],well:['good','better'],better:['good','best'],
  };
  const lo=correctAns.split(' ').pop().toLowerCase().replace(/[.,!?'"]/g,'');
  if(FB[lo]){const opts=FB[lo].filter(w=>!visLow.some(v=>v===w));if(opts.length)return opts[0];}
  // Last resort
  return lo.endsWith('s')?lo.slice(0,-1):lo+'s';
}

function renderQuick(item, area){
  const qWords = item.q.split(' ');
  let {pos, count} = findWrongPhrase(qWords, item.a);

  // ── Extend gap when word before blank belongs to same class as first word of answer ──
  // e.g. "I saw a [old man]" with answer "an old man" → extend to "I saw [a old man]"
  if(pos > 0){
    const _ART = new Set(['a','an','the']);
    const _TOBE = new Set(['is','are','am','was','were','be']);
    const _DO  = new Set(['do','does','did']);
    const prevW = qWords[pos-1].toLowerCase().replace(/[.,!?'"]/g,'');
    const firstA = item.a.toLowerCase().split(' ')[0].replace(/[.,!?'"]/g,'');
    for(const cls of [_ART, _TOBE, _DO]){
      if(cls.has(prevW) && cls.has(firstA) && prevW !== firstA){
        pos--; count++; break;
      }
    }
  }

  let wrongPhrase = qWords.slice(pos, pos+count).join(' ');
  const visibleWords = [...qWords.slice(0,pos), ...qWords.slice(pos+count)];

  // If wrong phrase repeats in visible sentence or equals correct answer → find clean distractor
  const wrongLow = wrongPhrase.toLowerCase().replace(/[.,!?'"]/g,'');
  const cLow = item.a.toLowerCase().replace(/[.,!?'"]/g,'');
  const visLow = visibleWords.map(w=>w.toLowerCase().replace(/[.,!?'"]/g,''));
  if(wrongLow===cLow || visLow.some(v=>v.length>1 && (v===wrongLow || wrongLow===v))){
    wrongPhrase = getDistractor(item.a, visibleWords, getItems(), exIndex);
  }

  // Build gapped sentence
  const gapped = [
    ...qWords.slice(0, pos),
    '<span class="qblank">______</span>',
    ...qWords.slice(pos+count)
  ].join(' ');

  // Two choices: correct vs wrong
  const flip = Math.random() < 0.5;
  const optA = flip ? item.a : wrongPhrase;
  const optB = flip ? wrongPhrase : item.a;
  const correctIsA = flip;

  area.innerHTML = `
    <div class="section-label" style="margin-bottom:10px">اختر الخيار الصحيح للفراغ:</div>
    <div class="quick-sentence">${gapped}</div>
    <div class="quick-pick-wrap" id="quick-wrap">
      <button class="quick-card" onclick="pickQuick(this,'a')" data-correct="${correctIsA}">
        <span class="qcard-letter">A</span>
        <span class="qcard-text">${optA}</span>
      </button>
      <button class="quick-card" onclick="pickQuick(this,'b')" data-correct="${!correctIsA}">
        <span class="qcard-letter">B</span>
        <span class="qcard-text">${optB}</span>
      </button>
    </div>
    <div class="hint-text" id="hint-text"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <div class="ex-nav">
      <button class="btn btn-ghost btn-prev" onclick="prevEx()" ${exIndex===0?'disabled':''}>&#8592; Prev</button>
      <span class="ex-counter">${exIndex+1} / ${getItems().length}</span>
      <button class="btn btn-ghost" id="btn-hint" onclick="showHint()">&#128161; Hint</button>
    </div>
  `;
}

function pickQuick(el, which){
  if(exAnswered) return;
  const correct = el.dataset.correct === 'true';
  exAnswered = true;

  // Style both cards
  document.querySelectorAll('.quick-card').forEach(c=>{
    const isCorrect = c.dataset.correct === 'true';
    c.classList.add(isCorrect ? 'qcard-correct' : 'qcard-wrong');
    c.disabled = true;
  });

  if(correct){
    playCorrectSound();
    const fb = document.getElementById('feedback-box');
    if(fb){ fb.className='feedback-box correct'; fb.textContent='✓ Correct! Well done.'; }
    if(!window._scored){ sessionScore[exIndex]=true; saveQS(); }
  } else {
    playWrongSound();
    const item = getItems()[exIndex];
    const fb = document.getElementById('feedback-box');
    if(fb){ fb.className='feedback-box wrong'; fb.innerHTML=`✗ Not quite.<br>Correction: <strong>${item.a}</strong>`; }
    if(!window._scored){ window._scored=true; sessionScore[exIndex]=false; saveQS(); }
  }
  window._scored = false;
  updateScoreDots();
  setTimeout(()=>nextEx(), 1200);
}

function renderTrans(item, area){
  // Strip trailing punctuation — keep for answer comparison
  const raw = item.a;
  const trailing = raw.match(/[.!?]$/)?.[0] || '';
  const words = raw.replace(/[.!?]$/, '').split(' ');

  // Fisher-Yates shuffle into pool
  const order = words.map((_,i)=>i);
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}

  // Global trans state
  window._tw = words;          // correct words in correct order
  window._ttr = trailing;      // trailing punctuation
  window._tp = order.map((origIdx,poolIdx)=>({w:words[origIdx],origIdx,poolIdx,used:false}));
  window._ta = [];              // answer stack

  area.innerHTML = `
    <div class="section-label" style="margin-bottom:8px">رتّب الكلمات لتكوين الجملة الصحيحة:</div>
    <div class="ex-ar">${item.ar}</div>
    <div class="answer-zone" id="trans-ans"><span class="ans-placeholder">اضغط الكلمات أدناه لترتيبها</span></div>
    <div class="word-pool" id="trans-pool"></div>
    <div class="hint-text" id="hint-text"></div>
    <div class="feedback-box" id="feedback-box"></div>
  `;
  refreshTransUI();
}

function refreshTransUI(){
  const ans = window._ta;
  const pool = window._tp;
  const az = document.getElementById('trans-ans');
  const wp = document.getElementById('trans-pool');
  if(!az||!wp) return;

  if(ans.length){
    az.className = 'answer-zone has-words';
    az.innerHTML = ans.map((p,i)=>`<span class="word-tile ans-tile" onclick="tapAnsWord(${i})">${p.w}</span>`).join('');
  } else {
    az.className = 'answer-zone';
    az.innerHTML = '<span class="ans-placeholder">اضغط الكلمات أدناه لترتيبها</span>';
  }

  wp.innerHTML = pool.map((p,i)=>
    p.used
      ? `<span class="word-tile pool-tile used"></span>`
      : `<span class="word-tile pool-tile" onclick="tapPoolWord(${i})">${p.w}</span>`
  ).join('');
}

function tapPoolWord(i){
  if(exAnswered) return;
  window._tp[i].used = true;
  window._ta.push(window._tp[i]);
  refreshTransUI();
}

function tapAnsWord(i){
  if(exAnswered) return;
  const p = window._ta.splice(i,1)[0];
  window._tp[p.poolIdx].used = false;
  refreshTransUI();
}

function showHint(){
  const item = getItems()[exIndex];
  const el = document.getElementById('hint-text');
  if(el) el.textContent = '💡 ' + (item.h || item.a);
}

function normalize(s){ return s.trim().toLowerCase().replace(/[.,!?''"]/g,'').replace(/\s+/g,' ') }

function checkAnswer(){
  if(exAnswered) return;
  const item = getItems()[exIndex];
  let correct = false;

  if(currentMode === 'fill'){
    const inp = document.getElementById('ex-ans');
    if(!inp) return;
    const val = inp.value.trim();
    if(!val){ document.getElementById('hint-text').textContent = 'Please type an answer first.'; return; }
    const accepted = item.a.split('/').map(a=>normalize(a));
    correct = accepted.includes(normalize(val));
    inp.classList.add(correct?'correct':'wrong');
    showFeedback(correct, item.a, val);

    if(!correct){
      if(!window._scored){ window._scored=true; sessionScore[exIndex]=false; saveQS(); updateScoreDots(); }
      setTimeout(()=>{
        inp.value = '';
        inp.classList.remove('wrong');
        const fb = document.getElementById('feedback-box');
        if(fb){
          fb.className = 'feedback-box wrong';
          fb.innerHTML = '✏️ الجواب الصحيح: <strong>' + item.a + '</strong> — اكتبه الآن';
        }
        inp.focus();
      }, 1200);
      return;
    }

  } else if(currentMode === 'trans'){
    const ans = window._ta || [];
    if(!ans.length){ document.getElementById('hint-text').textContent = 'اضغط على الكلمات لترتيبها أولاً.'; return; }
    const built = ans.map(p=>p.w).join(' ') + (window._ttr||'');
    const accepted = item.a.split('/').map(a=>normalize(a));
    correct = accepted.includes(normalize(built));

    document.querySelectorAll('.ans-tile').forEach(t=>t.classList.add(correct?'correct-tile':'wrong-tile'));
    document.querySelectorAll('.pool-tile,.ans-tile').forEach(t=>{t.onclick=null;});
    showFeedback(correct, item.a, built);

    if(!correct){
      if(!window._scored){ window._scored=true; sessionScore[exIndex]=false; saveQS(); updateScoreDots(); }
      setTimeout(()=>{
        window._tp.forEach(p=>p.used=false);
        window._ta = [];
        refreshTransUI();
        const fb = document.getElementById('feedback-box');
        if(fb){ fb.className='feedback-box wrong'; fb.innerHTML='الترتيب الصحيح: <strong>'+item.a+'</strong>'; }
      }, 1500);
      return;
    }

  } else if(currentMode === 'error'){
    if(window._huntSelected < 0){ document.getElementById('hint-text').textContent = 'Click a word first.'; return; }
    const words = item.q.split(' ');
    const correctWord = item.a.toLowerCase();
    const selected = words[window._huntSelected].toLowerCase().replace(/[.,!?]/g,'');
    correct = item.a.toLowerCase().includes(selected) || selected.includes(correctWord.split(' ')[0]);
    const btn = document.querySelector(`.word-btn[data-i="${window._huntSelected}"]`);
    if(btn) btn.classList.add(correct?'correct-pick':'wrong-pick');
    const ansWords = item.a.toLowerCase().split(' ');
    document.querySelectorAll('.word-btn').forEach(b=>{
      const w = b.textContent.toLowerCase().replace(/[.,!?]/g,'');
      if(ansWords.some(aw=>aw.includes(w)||w.includes(aw))) b.classList.add('correct-pick');
    });
    showFeedback(correct, 'Correct phrase: "' + item.a + '"', '');

    if(!correct){
      if(!window._scored){ window._scored=true; sessionScore[exIndex]=false; saveQS(); updateScoreDots(); }
      setTimeout(()=>{
        document.querySelectorAll('.word-btn').forEach(b=>b.classList.remove('selected','wrong-pick'));
        const fb = document.getElementById('feedback-box');
        if(fb){
          fb.className = 'feedback-box wrong';
          fb.innerHTML = '✏️ الكلمة الصحيحة: <strong>' + item.a + '</strong> — اضغط الكلمة الخاطئة';
        }
        window._huntSelected = -1;
      }, 1200);
      return;
    }
  }

  // correct — lock and auto-advance after 900ms
  if(!window._scored){ sessionScore[exIndex]=true; saveQS(); }
  window._scored = false;
  exAnswered = true;
  updateScoreDots();
  setTimeout(()=>nextEx(), 900);
}

function showFeedback(correct, answer, given){
  const box = document.getElementById('feedback-box');
  if(!box) return;
  box.className = 'feedback-box ' + (correct?'correct':'wrong');
  if(correct){ playCorrectSound(); box.textContent = '✓ Correct! Well done.' }
  else { playWrongSound(); box.innerHTML = '✗ Not quite.<br>Correct answer: <strong>' + answer + '</strong>' }
}

function saveQS(){
  const rs = ruleState(currentRule.id);
  rs.qs[currentMode] = sessionScore.slice();
  // update mode pct from saved answers
  const total = sessionScore.filter(v=>v!==undefined).length;
  const ok = sessionScore.filter(v=>v===true).length;
  if(total > 0){ rs[currentMode] = Math.round(ok/total*100); }
  if((rs.fill||0)>=60 && (rs.trans||0)>=60) rs.done = true;
  save();
}

function nextEx(){
  exIndex++;
  window._scored = false;
  renderEx();
}

function prevEx(){
  if(exIndex <= 0) return;
  exIndex--;
  exAnswered = false;
  window._scored = false;
  renderEx();
}

function updateScoreDots(){
  const items = getItems();
  const el = document.getElementById('ex-score');
  el.innerHTML = items.map((_,i)=>{
    let cls = 'dot';
    if(sessionScore[i] === true) cls += ' ok';
    else if(sessionScore[i] === false) cls += ' bad';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderComplete(){
  const total = sessionScore.length;
  const ok = sessionScore.filter(Boolean).length;
  const pct = total ? Math.round(ok/total*100) : 0;
  const circ = 2*Math.PI*36;
  const offset = circ - (pct/100)*circ;
  saveQS();  // persist per-question answers
  const rs = ruleState(currentRule.id);

  const area = document.getElementById('exercise-area');
  area.innerHTML = `
    <div class="complete-card">
      <div class="score-ring">
        <svg viewBox="0 0 80 80" width="90" height="90">
          <circle class="ring-bg" cx="40" cy="40" r="36"/>
          <circle class="ring-fill" cx="40" cy="40" r="36"
            stroke-dasharray="${circ.toFixed(1)}"
            stroke-dashoffset="${offset.toFixed(1)}"
            stroke="${pct>=60?'var(--success)':'var(--warning)'}"/>
        </svg>
        <div class="score-pct" style="color:${pct>=60?'var(--success)':'var(--warning)'}">${pct}%</div>
      </div>
      <div class="complete-icon">${pct>=80?'🏆':pct>=60?'👍':'📖'}</div>
      <div class="complete-title">${pct>=80?'Excellent!':pct>=60?'Good job!':'Keep practising!'}</div>
      <div class="complete-sub">${ok} / ${total} correct · ${pct>=60?'Rule marked complete ✓':pct+'% – try again for 60%+'}</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="restartMode()">🔄 Retry</button>
        <button class="btn btn-primary" onclick="showHome()">← Back to Levels</button>
      </div>
    </div>`;
}

function restartMode(){
  exIndex = 0; sessionScore = [...(ruleState(currentRule.id).qs?.[currentMode]||[]).slice()];
  startPractice();
}

// ── SOUND ──
let _ac = null;
function _getAC(){ if(!_ac) _ac = new (window.AudioContext||window.webkitAudioContext)(); if(_ac.state==='suspended') _ac.resume(); return _ac; }
function _beep(freq, dur, type='sine', vol=0.18, delay=0){
  try{
    const ac=_getAC(); const o=ac.createOscillator(); const g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    const t=ac.currentTime+delay;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.01);
  }catch(e){}
}
function playCorrectSound(){ _beep(523,0.12,'sine',0.2); _beep(659,0.18,'sine',0.18,0.12); }
function playWrongSound()  { _beep(220,0.22,'sawtooth',0.12); }

// ── INIT ──
buildHome();

// ── Service Worker (PWA / offline) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
