<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Grammar — Interactive Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf8f5; --bg-2:#f3ede4; --surface:#ffffff; --surface-2:#fdf9f6;
  --accent:#3a7ab8; --accent-tint:#d9eaf5; --accent-deep:#1e4d78;
  --success:#3d8f68; --success-tint:#e8f5ef; --error:#c04848; --error-tint:#fdeaea;
  --warning:#c09030; --warning-tint:#fdf3dc;
  --text:#1a2535; --text-2:#4a5e75; --text-3:#8a9bb0;
  --border:#dce6f0; --border-2:#b8cce0;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
  --font-ar:'Amiri',serif;
  --r-sm:6px; --r-md:12px; --r-lg:20px; --r-xl:28px; --r-full:9999px;
  --shadow-sm:0 2px 8px rgba(26,37,53,.07);
  --shadow-md:0 6px 20px rgba(26,37,53,.1);
  --ease-out:cubic-bezier(.25,.46,.45,.94);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.94)}60%{transform:scale(1.03)}100%{transform:scale(1)}}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── HOME ── */
#home{background:var(--bg)}
.home-header{background:linear-gradient(135deg,#1e4d78 0%,#2a6ba8 60%,#3a8fd4 100%);color:#fff;padding:48px 24px 56px;text-align:center;position:relative;overflow:hidden}
.home-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.home-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:var(--r-full);padding:5px 14px;font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px;animation:fadeUp .5s var(--ease-out) both}
.home-title{font-family:var(--font-display);font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;line-height:1.15;margin-bottom:10px;animation:fadeUp .5s var(--ease-out) .08s both}
.home-subtitle{font-size:1rem;opacity:.85;font-weight:300;animation:fadeUp .5s var(--ease-out) .16s both}
.home-subtitle-ar{font-family:'Amiri',serif;font-size:1.05rem;opacity:.8;direction:rtl;margin-top:6px;animation:fadeUp .5s var(--ease-out) .22s both}
.level-name-ar{font-family:'Amiri',serif;font-size:.95rem;color:var(--text-2);font-weight:400}
.level-desc-ar{font-family:'Amiri',serif;font-size:.85rem;color:var(--text-3);direction:rtl;display:block;margin-top:2px}
.stats-bar{display:flex;justify-content:center;gap:32px;background:var(--surface);margin:-24px auto 0;max-width:560px;border-radius:var(--r-xl);padding:20px 32px;box-shadow:var(--shadow-md);position:relative;z-index:2;animation:fadeUp .6s var(--ease-out) .24s both}
.stat{text-align:center}
.stat-n{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat-l{font-size:.75rem;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.levels-wrap{max-width:720px;margin:40px auto 0;padding:0 20px 80px}
.levels-heading{font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:20px}
.level-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 22px;margin-bottom:14px;cursor:pointer;transition:transform .2s var(--ease-out),box-shadow .2s var(--ease-out),border-color .2s;animation:fadeUp .45s var(--ease-out) both}
.level-card:nth-child(2){animation-delay:.06s}.level-card:nth-child(3){animation-delay:.12s}.level-card:nth-child(4){animation-delay:.18s}.level-card:nth-child(5){animation-delay:.24s}
.level-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--border-2)}
.level-card:active{transform:scale(.98)}
.level-head{display:flex;align-items:center;gap:14px}
.level-badge{width:44px;height:44px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;font-family:var(--font-display);flex-shrink:0}
.lv-A1 .level-badge{background:#e8f5ef;color:#2a7a55}
.lv-A2 .level-badge{background:#e8f0fb;color:#3558b0}
.lv-B1 .level-badge{background:#fdf3dc;color:#a07020}
.lv-B2 .level-badge{background:#fdeaea;color:#b03030}
.lv-C1 .level-badge{background:#f0e8fb;color:#6030a0}
.level-info{flex:1}
.level-name{font-size:1rem;font-weight:600;margin-bottom:2px}
.level-desc{font-size:.82rem;color:var(--text-3)}
.level-count{font-size:.8rem;font-weight:600;color:var(--text-2);white-space:nowrap}
.level-rules{display:none;padding:12px 0 8px;gap:8px;flex-wrap:wrap}
.level-card.open .level-rules{display:flex}
.rule-chip{display:inline-flex;flex-direction:column;align-items:flex-start;gap:2px;padding:8px 14px;border:1px solid var(--border);border-radius:var(--r-md);font-size:.8rem;cursor:pointer;transition:all .15s;background:var(--bg)}
.rule-chip:hover{background:var(--accent-tint);border-color:var(--accent);color:var(--accent-deep)}
.chip-en{font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:5px}
.chip-ar{font-family:'Amiri',serif;font-size:.85rem;direction:rtl;color:var(--text-3);line-height:1}
.rule-chip:hover .chip-ar{color:var(--accent-deep)}
.done-check{color:var(--success);font-size:.9rem}
.progress-bar-wrap{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#5ab4e8);border-radius:2px;transition:width .5s var(--ease-out)}

/* ── RULE DETAIL ── */
#detail{background:var(--bg)}
.detail-nav{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1.5px solid var(--border);border-radius:var(--r-full);font-size:.82rem;font-weight:600;cursor:pointer;background:var(--bg);color:var(--text);transition:all .15s}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.detail-nav-title{font-weight:600;font-size:.92rem;flex:1}
.detail-nav-lvl{font-size:.75rem;font-weight:600;padding:4px 10px;border-radius:var(--r-full);letter-spacing:.05em}
.lv-A1 .detail-nav-lvl,.detail-nav-lvl.lv-A1{background:#e8f5ef;color:#2a7a55}
.lv-A2 .detail-nav-lvl,.detail-nav-lvl.lv-A2{background:#e8f0fb;color:#3558b0}
.lv-B1 .detail-nav-lvl,.detail-nav-lvl.lv-B1{background:#fdf3dc;color:#a07020}
.lv-B2 .detail-nav-lvl,.detail-nav-lvl.lv-B2{background:#fdeaea;color:#b03030}
.lv-C1 .detail-nav-lvl,.detail-nav-lvl.lv-C1{background:#f0e8fb;color:#6030a0}
.detail-body{max-width:680px;margin:0 auto;padding:28px 20px 100px}
.rule-hero{background:linear-gradient(135deg,var(--accent-deep),var(--accent));color:#fff;border-radius:var(--r-xl);padding:28px 28px 24px;margin-bottom:24px;animation:fadeUp .4s var(--ease-out) both}
.rule-icon{font-size:2rem;margin-bottom:10px}
.rule-title{font-family:var(--font-display);font-size:1.6rem;font-weight:700;line-height:1.2;margin-bottom:4px}
.rule-subtitle{opacity:.8;font-size:.9rem}
.rule-arabic{font-family:var(--font-ar);font-size:1rem;direction:rtl;margin-top:8px;opacity:.9}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;margin-bottom:16px;animation:fadeUp .4s var(--ease-out) both}
.section-label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
.formula-box{background:var(--bg-2);border-radius:var(--r-md);padding:12px 16px;font-family:'Courier New',monospace;font-size:.88rem;color:var(--accent-deep);line-height:1.6}
.explanation-text{font-size:.95rem;line-height:1.65;color:var(--text-2)}
.explanation-text b{color:var(--accent-deep)}
.examples-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.examples-list li{background:var(--bg);border-left:3px solid var(--accent);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:9px 14px;font-size:.9rem;line-height:1.5}
.examples-list li b{color:var(--accent-deep)}
/* mode tabs */
.mode-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.mode-tab{flex:1;min-width:90px;padding:10px 8px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:.8rem;font-weight:600;cursor:pointer;text-align:center;background:var(--bg);transition:all .15s}
.mode-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mode-tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}
/* exercises */
.exercise-area{min-height:280px}
.ex-q{font-size:1rem;line-height:1.65;margin-bottom:20px;color:var(--text)}
.ex-ar{font-family:var(--font-ar);font-size:1.15rem;direction:rtl;text-align:right;background:var(--bg-2);border-radius:var(--r-md);padding:14px 16px;margin-bottom:20px;color:var(--text);line-height:1.8}
.ex-input{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:var(--r-md);font-family:var(--font-body);font-size:.95rem;background:var(--bg);color:var(--text);outline:none;transition:border-color .18s,box-shadow .18s}
.ex-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
.ex-input.correct{border-color:var(--success);background:var(--success-tint)}
.ex-input.wrong{border-color:var(--error);background:var(--error-tint)}
.hint-text{font-size:.8rem;color:var(--text-3);margin-top:6px;min-height:18px}
.feedback-box{border-radius:var(--r-md);padding:12px 16px;margin-top:12px;font-size:.88rem;line-height:1.5;display:none}
.feedback-box.correct{background:var(--success-tint);color:#1d6645;display:block}
.feedback-box.wrong{background:var(--error-tint);color:#8c2020;display:block}
.ex-nav{display:flex;align-items:center;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:var(--r-full);font-family:var(--font-body);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(58,122,184,.3)}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{background:var(--bg-2);color:var(--text);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.ex-counter{font-size:.82rem;color:var(--text-3);font-weight:500}
.ex-score{display:flex;gap:4px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.dot.ok{background:var(--success)}
.dot.bad{background:var(--error)}
/* error-hunt specific */
.sentence-hunt{font-size:1rem;line-height:1.9;padding:14px 16px;background:var(--bg);border-radius:var(--r-md);border:1.5px solid var(--border);margin-bottom:16px}
.word-btn{display:inline;padding:2px 3px;border-radius:4px;cursor:pointer;transition:background .12s;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit}
.word-btn:hover{background:var(--accent-tint)}
.word-btn.selected{background:var(--warning-tint);border-bottom:2px solid var(--warning)}
.word-btn.correct-pick{background:var(--success-tint);border-bottom:2px solid var(--success)}
.word-btn.wrong-pick{background:var(--error-tint);border-bottom:2px solid var(--error)}
/* complete screen */
.complete-card{background:var(--surface);border-radius:var(--r-xl);padding:36px 28px;text-align:center;box-shadow:var(--shadow-md);animation:pop .4s var(--ease-spring) both}
.complete-icon{font-size:3rem;margin-bottom:14px}
.complete-title{font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:8px}
.complete-sub{color:var(--text-2);font-size:.92rem;margin-bottom:24px}
.score-ring{width:90px;height:90px;margin:0 auto 20px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:8}
.score-ring .ring-fill{fill:none;stroke:var(--success);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease-out)}
.score-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--success)}

/* ── OVERALL PROGRESS TOAST ── */
.progress-toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 18px;box-shadow:var(--shadow-md);font-size:.82rem;z-index:100;display:none;animation:fadeUp .3s var(--ease-out)}
.progress-toast.visible{display:block}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-header">
    <div class="home-badge">✦ Interactive Grammar</div>
    <h1 class="home-title">English Grammar<br>Made Fun</h1>
    <p class="home-subtitle">32 rules · Fill, Hunt &amp; Translate · Arabic support</p>
    <p class="home-subtitle-ar">٣٢ قاعدة · أكمل الفراغ · اصطد الخطأ · ترجمة</p>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-n" id="stat-done">0</div><div class="stat-l">Completed</div></div>
    <div class="stat"><div class="stat-n">32</div><div class="stat-l">Rules</div></div>
    <div class="stat"><div class="stat-n" id="stat-pct">0%</div><div class="stat-l">Progress</div></div>
  </div>
  <div class="levels-wrap">
    <div class="levels-heading">Choose a level</div>
    <div id="level-list"></div>
  </div>
</div>

<!-- DETAIL -->
<div id="detail" class="screen">
  <div class="detail-nav">
    <button class="btn-back" onclick="showHome()">← Back</button>
    <span class="detail-nav-title" id="detail-nav-title"></span>
    <span class="detail-nav-lvl" id="detail-nav-lvl"></span>
  </div>
  <div class="detail-body">
    <div class="rule-hero" id="rule-hero">
      <div class="rule-icon" id="r-icon"></div>
      <div class="rule-title" id="r-title"></div>
      <div class="rule-subtitle" id="r-subtitle"></div>
      <div class="rule-arabic" id="r-arabic"></div>
    </div>
    <div class="section-card" style="animation-delay:.06s">
      <div class="section-label">Formula</div>
      <div class="formula-box" id="r-formula"></div>
    </div>
    <div class="section-card" style="animation-delay:.1s">
      <div class="section-label">Explanation</div>
      <div class="explanation-text" id="r-explanation"></div>
    </div>
    <div class="section-card" style="animation-delay:.14s">
      <div class="section-label">Examples</div>
      <ul class="examples-list" id="r-examples"></ul>
    </div>
    <div class="section-card" style="animation-delay:.18s">
      <div class="section-label">Practice</div>
      <div class="mode-tabs">
        <div class="mode-tab active" onclick="setMode('fill',this)">✏️ Fill Blank</div>
        <div class="mode-tab" onclick="setMode('error',this)">🔍 Error Hunt</div>
        <div class="mode-tab" onclick="setMode('trans',this)">🌐 Translate</div>
      </div>
      <div class="ex-score" id="ex-score"></div>
      <div class="exercise-area" id="exercise-area"></div>
    </div>
  </div>
</div>

<script>
const GRAMMAR = [{"id": 1, "level": "A1", "icon": "📝", "title": "Articles", "subtitle": "a / an / the", "arabic": "أدوات التعريف والتنكير", "explanation": "استخدم <b>a</b> قبل الأصوات الساكنة، <b>an</b> قبل الأصوات المتحركة، و<b>the</b> عندما يكون الاسم محدداً.", "formula": "a + consonant | an + vowel | the + specific noun", "examples": ["I have <b>a</b> dog.", "She ate <b>an</b> apple.", "<b>The</b> sun is very hot today."], "fill": [{"q": "She is ___ nurse at the big hospital.", "a": "a", "h": "nurse starts with consonant"}, {"q": "He found ___ old book in the library.", "a": "an", "h": "old starts with vowel"}, {"q": "Please close ___ door — it is very cold.", "a": "the", "h": "specific door"}, {"q": "I want to be ___ engineer one day.", "a": "an", "h": "engineer starts with vowel"}, {"q": "They live near ___ river in the village.", "a": "the", "h": "specific river"}, {"q": "She bought ___ umbrella for the rain.", "a": "an", "h": "umbrella starts with vowel"}], "error": [{"q": "She is a engineer at the company.", "a": "an engineer", "h": "engineer starts with a vowel"}, {"q": "I saw a old man sitting in the park.", "a": "an old man", "h": "old starts with a vowel"}, {"q": "Close a door when you leave the room.", "a": "the door", "h": "specific door - use the"}, {"q": "He has a hour to finish the exam.", "a": "an hour", "h": "hour has vowel sound (silent h)"}, {"q": "She is best student in the class.", "a": "the best student", "h": "superlative needs the"}, {"q": "We watched a sun set over the sea.", "a": "the sun", "h": "only one sun - use the"}], "trans": [{"ar": "هي طبيبة.", "a": "She is a doctor."}, {"ar": "أكل تفاحة.", "a": "He ate an apple."}, {"ar": "القمر جميل الليلة.", "a": "The moon is beautiful tonight."}, {"ar": "اشترى سيارة جديدة.", "a": "He bought a new car."}, {"ar": "فتحت النافذة.", "a": "She opened the window."}, {"ar": "أريد أن أكون معلماً.", "a": "I want to be a teacher."}]}, {"id": 2, "level": "A1", "icon": "🔵", "title": "Verb To Be", "subtitle": "am / is / are", "arabic": "فعل الكون في المضارع", "explanation": "استخدم <b>am</b> مع I، و<b>is</b> مع he/she/it، و<b>are</b> مع you/we/they.", "formula": "I am | he/she/it is | you/we/they are", "examples": ["I <b>am</b> happy today.", "She <b>is</b> a teacher.", "They <b>are</b> my friends."], "fill": [{"q": "He ___ very tall and strong.", "a": "is", "h": "he goes with is"}, {"q": "We ___ from Saudi Arabia.", "a": "are", "h": "we goes with are"}, {"q": "I ___ so tired after the long day.", "a": "am", "h": "I goes with am"}, {"q": "The children ___ in the garden.", "a": "are", "h": "plural goes with are"}, {"q": "My mother ___ a very good cook.", "a": "is", "h": "she goes with is"}, {"q": "You ___ my best friend.", "a": "are", "h": "you goes with are"}], "error": [{"q": "She am a student at the university.", "a": "She is", "h": "she goes with is"}, {"q": "They is very happy today.", "a": "They are", "h": "they goes with are"}, {"q": "I are hungry - can we eat now?", "a": "I am", "h": "I goes with am"}, {"q": "We is from the same city.", "a": "We are", "h": "we goes with are"}, {"q": "He are my brother.", "a": "He is", "h": "he goes with is"}, {"q": "The dogs is in the garden.", "a": "The dogs are", "h": "plural goes with are"}], "trans": [{"ar": "أنا متعب جداً اليوم.", "a": "I am very tired today."}, {"ar": "هو طالب ذكي.", "a": "He is a smart student."}, {"ar": "هم في المدرسة.", "a": "They are at school."}, {"ar": "أنتِ جميلة.", "a": "You are beautiful."}, {"ar": "هي سعيدة جداً.", "a": "She is very happy."}, {"ar": "نحن أصدقاء.", "a": "We are friends."}]}, {"id": 3, "level": "A1", "icon": "⏰", "title": "Present Simple", "subtitle": "I work / she works", "arabic": "المضارع البسيط", "explanation": "للحقائق والعادات. أضف <b>-s</b> مع he/she/it. النفي: <b>don't / doesn't</b>.", "formula": "I/you/we/they + verb | he/she/it + verb+s | don't/doesn't + verb", "examples": ["She <b>works</b> in a hospital.", "They <b>don't eat</b> meat.", "<b>Does</b> he speak Arabic?"], "fill": [{"q": "She ___ to school every morning.", "a": "goes", "h": "she - verb+s: go becomes goes"}, {"q": "They ___ football every Friday.", "a": "play", "h": "they - base form"}, {"q": "He ___ eat meat - he is vegetarian.", "a": "doesn't", "h": "he + negative - doesn't"}, {"q": "___ she speak English at home?", "a": "Does", "h": "question with she - Does"}, {"q": "I ___ my teeth twice a day.", "a": "brush", "h": "I - base form"}, {"q": "Water ___ at 100 degrees Celsius.", "a": "boils", "h": "it - verb+s"}], "error": [{"q": "She go to school by bus every day.", "a": "She goes", "h": "she - add -s: goes"}, {"q": "He don't like cold weather at all.", "a": "He doesn't like", "h": "he - use doesn't"}, {"q": "Do she work at the hospital?", "a": "Does she work", "h": "she - use Does"}, {"q": "They plays football every weekend.", "a": "They play", "h": "they - base form, no -s"}, {"q": "I doesn't understand this question.", "a": "I don't understand", "h": "I - use don't"}, {"q": "The sun rise in the east every morning.", "a": "The sun rises", "h": "the sun (it) - add -s"}], "trans": [{"ar": "هي تعمل في مستشفى كبير.", "a": "She works in a big hospital."}, {"ar": "هم لا يأكلون اللحم.", "a": "They don't eat meat."}, {"ar": "هل يتكلم العربية؟", "a": "Does he speak Arabic?"}, {"ar": "أذهب إلى المدرسة كل يوم.", "a": "I go to school every day."}, {"ar": "هي لا تحب القهوة.", "a": "She doesn't like coffee."}, {"ar": "هل تلعب كرة القدم؟", "a": "Do you play football?"}]}, {"id": 4, "level": "A1", "icon": "📚", "title": "Plural Nouns", "subtitle": "cats / boxes / cities", "arabic": "جمع الأسماء", "explanation": "أضف <b>-s</b> عادةً. أضف <b>-es</b> بعد s/sh/ch/x/z. غيّر <b>-y إلى -ies</b>. بعض الأسماء شاذة.", "formula": "-s (dog>dogs) | -es (box>boxes) | -y>-ies (city>cities) | irregular (child>children)", "examples": ["I have three <b>cats</b>.", "She put the <b>boxes</b> on the shelf.", "The <b>children</b> are playing."], "fill": [{"q": "She bought two ___ (dress) for the party.", "a": "dresses", "h": "-ss - add -es"}, {"q": "There are many ___ (child) in the park.", "a": "children", "h": "irregular plural"}, {"q": "He ate three ___ (sandwich) for lunch.", "a": "sandwiches", "h": "-ch - add -es"}, {"q": "The ___ (city) in this country are beautiful.", "a": "cities", "h": "-y becomes -ies"}, {"q": "She saw two ___ (wolf) in the forest.", "a": "wolves", "h": "-f becomes -ves"}, {"q": "There are five ___ (man) in the room.", "a": "men", "h": "irregular plural"}], "error": [{"q": "She has three childs and they are very clever.", "a": "children", "h": "child becomes children"}, {"q": "There are two boxs on the table.", "a": "boxes", "h": "box - add -es"}, {"q": "The citys in France are very beautiful.", "a": "cities", "h": "city - change -y to -ies"}, {"q": "He bought two watchs at the market.", "a": "watches", "h": "watch - add -es"}, {"q": "She has two foots and ten tooths.", "a": "feet and ten teeth", "h": "foot>feet, tooth>teeth"}, {"q": "There are many sheeps on the farm.", "a": "sheep", "h": "sheep has no plural change"}], "trans": [{"ar": "عندها ثلاث قطط.", "a": "She has three cats."}, {"ar": "الأطفال يلعبون في الحديقة.", "a": "The children are playing in the garden."}, {"ar": "اشترى صندوقين.", "a": "He bought two boxes."}, {"ar": "مدن هذا البلد جميلة.", "a": "The cities in this country are beautiful."}, {"ar": "رأى الرجلين في السوق.", "a": "She saw two men at the market."}, {"ar": "هناك أسماك كثيرة في البحر.", "a": "There are many fish in the sea."}]}, {"id": 5, "level": "A1", "icon": "👤", "title": "Possessives", "subtitle": "my / your / his / her", "arabic": "ضمائر الملكية", "explanation": "ضمائر الملكية تأتي قبل الاسم. للأسماء: أضف <b>'s</b>.", "formula": "my / your / his / her / its / our / their + noun | noun+'s", "examples": ["This is <b>my</b> book.", "<b>Her</b> sister is a doctor.", "<b>John's</b> car is blue."], "fill": [{"q": "She loves ___ mother very much.", "a": "her", "h": "she - her"}, {"q": "They left ___ bags at the hotel.", "a": "their", "h": "they - their"}, {"q": "This is ___ phone - please give it back.", "a": "my", "h": "I - my"}, {"q": "The cat hurt ___ paw on the rock.", "a": "its", "h": "it - its (no apostrophe)"}, {"q": "We cleaned ___ classroom before leaving.", "a": "our", "h": "we - our"}, {"q": "Is this ___ book? I found it on your desk.", "a": "your", "h": "you - your"}], "error": [{"q": "She gave him her's book at the end of class.", "a": "her book", "h": "her - no apostrophe needed"}, {"q": "The dog hurt it's leg when it fell.", "a": "its leg", "h": "its = possessive, no apostrophe"}, {"q": "My sister name is Sara - she is very kind.", "a": "My sister's name", "h": "sister + apostrophe s"}, {"q": "He forgot he's jacket at school.", "a": "his jacket", "h": "he - his"}, {"q": "Is this you bag or hers?", "a": "your bag", "h": "you - your"}, {"q": "They lost their's luggage at the airport.", "a": "their luggage", "h": "their - no apostrophe"}], "trans": [{"ar": "هذا كتابي.", "a": "This is my book."}, {"ar": "أخت صديقها طبيبة.", "a": "Her friend's sister is a doctor."}, {"ar": "أين حقيبتك؟", "a": "Where is your bag?"}, {"ar": "تركوا حقائبهم في الفندق.", "a": "They left their bags at the hotel."}, {"ar": "القطة تعبت من ساقها.", "a": "The cat hurt its leg."}, {"ar": "نظفنا فصلنا.", "a": "We cleaned our classroom."}]}, {"id": 6, "level": "A1", "icon": "🏠", "title": "There is / There are", "subtitle": "there is / there are", "arabic": "يوجد / توجد", "explanation": "استخدم <b>there is</b> مع المفرد، و<b>there are</b> مع الجمع.", "formula": "There is + singular | There are + plural | Is/Are there...?", "examples": ["<b>There is</b> a cat on the roof.", "<b>There are</b> ten students in the room.", "<b>Is there</b> a bank near here?"], "fill": [{"q": "___ many books on the shelf.", "a": "There are", "h": "books - plural - There are"}, {"q": "___ a good restaurant near the hotel.", "a": "There is", "h": "restaurant - singular - There is"}, {"q": "___ any milk in the fridge?", "a": "Is there", "h": "question + singular - Is there"}, {"q": "___ three windows in my bedroom.", "a": "There are", "h": "three - plural"}, {"q": "___ no time left - we must hurry.", "a": "There is", "h": "no time - singular"}, {"q": "___ any students in the classroom?", "a": "Are there", "h": "question + plural - Are there"}], "error": [{"q": "There are a big park near my house.", "a": "There is a big park", "h": "park - singular - There is"}, {"q": "There is many problems with the new plan.", "a": "There are many problems", "h": "problems - plural - There are"}, {"q": "Is there any chairs in the room?", "a": "Are there any chairs", "h": "chairs - plural - Are there"}, {"q": "There are a beautiful view from my window.", "a": "There is a beautiful view", "h": "view - singular - There is"}, {"q": "There isn't any books on my shelf.", "a": "There aren't any books", "h": "books - plural - There aren't"}, {"q": "Are there a market in this street?", "a": "Is there a market", "h": "market - singular - Is there"}], "trans": [{"ar": "يوجد مستشفى قريب من هنا.", "a": "There is a hospital near here."}, {"ar": "يوجد عشرة طلاب في الفصل.", "a": "There are ten students in the classroom."}, {"ar": "هل يوجد بنك قريب؟", "a": "Is there a bank near here?"}, {"ar": "لا يوجد وقت كافٍ.", "a": "There is no time."}, {"ar": "هل يوجد كتب في المكتبة؟", "a": "Are there books in the library?"}, {"ar": "توجد مشاكل كثيرة.", "a": "There are many problems."}]}, {"id": 7, "level": "A1", "icon": "👆", "title": "Demonstratives", "subtitle": "this / that / these / those", "arabic": "أسماء الإشارة", "explanation": "<b>This/These</b> للقريب. <b>That/Those</b> للبعيد. <b>This/That</b> مع المفرد. <b>These/Those</b> مع الجمع.", "formula": "this/that + singular | these/those + plural", "examples": ["<b>This</b> is my phone.", "<b>Those</b> shoes are beautiful.", "I love <b>these</b> colours."], "fill": [{"q": "Look at ___ mountain over there - it is huge!", "a": "that", "h": "far + singular - that"}, {"q": "___ are my parents standing by the door.", "a": "These", "h": "near + plural - These"}, {"q": "Can I try ___ shoes in the window?", "a": "those", "h": "far + plural - those"}, {"q": "___ is the best film I have ever seen!", "a": "This", "h": "near + singular - This"}, {"q": "Are ___ your books or mine?", "a": "those", "h": "far + plural - those"}, {"q": "I want to buy ___ red dress here.", "a": "this", "h": "near + singular - this"}], "error": [{"q": "This books are really interesting to read.", "a": "These books", "h": "books - plural - These"}, {"q": "These is my car - please don't touch it.", "a": "This is my car", "h": "car - singular - This"}, {"q": "I love that flowers in your garden.", "a": "those flowers", "h": "flowers - plural - those"}, {"q": "Those mountain over there is very tall.", "a": "That mountain", "h": "mountain - singular - That"}, {"q": "Is these your bag on the chair?", "a": "Is this your bag", "h": "bag - singular - this"}, {"q": "These are that book I told you about.", "a": "This is the book", "h": "book - singular - This is"}], "trans": [{"ar": "هذا كتابي المفضل.", "a": "This is my favourite book."}, {"ar": "تلك المدرسة كبيرة جداً.", "a": "That school is very big."}, {"ar": "هؤلاء أصدقائي.", "a": "These are my friends."}, {"ar": "أحب تلك الأزهار هناك.", "a": "I love those flowers over there."}, {"ar": "هل هذه حقيبتك؟", "a": "Is this your bag?"}, {"ar": "تلك السيارة سريعة جداً.", "a": "That car is very fast."}]}, {"id": 8, "level": "A2", "icon": "⏪", "title": "Past Simple", "subtitle": "worked / went / didn't", "arabic": "الماضي البسيط", "explanation": "للأفعال المنتظمة أضف <b>-ed</b>. للأفعال الشاذة احفظها. النفي: <b>didn't + base verb</b>.", "formula": "verb + -ed (regular) | irregular verb | didn't + base verb", "examples": ["She <b>visited</b> Paris last year.", "He <b>went</b> home early.", "They <b>didn't come</b> to the party."], "fill": [{"q": "She ___ (visit) her grandmother last weekend.", "a": "visited", "h": "regular - add -ed"}, {"q": "He ___ (not/eat) breakfast this morning.", "a": "didn't eat", "h": "negative - didn't + base verb"}, {"q": "They ___ (go) to the beach last summer.", "a": "went", "h": "irregular: go becomes went"}, {"q": "___ you (see) the film last night?", "a": "Did you see", "h": "question - Did + base verb"}, {"q": "She ___ (write) a long letter to her friend.", "a": "wrote", "h": "irregular: write becomes wrote"}, {"q": "We ___ (not/know) about the meeting.", "a": "didn't know", "h": "negative - didn't + base verb"}], "error": [{"q": "She goed to the market yesterday morning.", "a": "She went", "h": "go - went (irregular)"}, {"q": "He didn't went to school because he was sick.", "a": "He didn't go", "h": "didn't + base verb, not past"}, {"q": "Did she ate the cake at the party?", "a": "Did she eat", "h": "Did + base verb"}, {"q": "They buyed a new car last month.", "a": "They bought", "h": "buy - bought (irregular)"}, {"q": "I writed three emails before lunch today.", "a": "I wrote", "h": "write - wrote (irregular)"}, {"q": "Did they came to the meeting on time?", "a": "Did they come", "h": "Did + base verb"}], "trans": [{"ar": "زارت باريس السنة الماضية.", "a": "She visited Paris last year."}, {"ar": "ذهب إلى البيت مبكراً.", "a": "He went home early."}, {"ar": "هل رأيتَ الفيلم أمس؟", "a": "Did you see the film yesterday?"}, {"ar": "لم يحضر إلى الحفلة.", "a": "He didn't come to the party."}, {"ar": "كتبت رسالة طويلة.", "a": "She wrote a long letter."}, {"ar": "اشترينا سيارة جديدة.", "a": "We bought a new car."}]}, {"id": 9, "level": "A2", "icon": "🔄", "title": "Present Continuous", "subtitle": "am/is/are + -ing", "arabic": "المضارع المستمر", "explanation": "للأفعال التي تحدث الآن أو مؤقتاً. الصيغة: <b>am/is/are + verb-ing</b>.", "formula": "am/is/are + verb-ing | not + am/is/are + verb-ing | Am/Is/Are + subject + verb-ing?", "examples": ["I <b>am studying</b> right now.", "She <b>is not coming</b> today.", "<b>Are</b> they <b>waiting</b> outside?"], "fill": [{"q": "She ___ (read) a very good book right now.", "a": "is reading", "h": "she + now - is reading"}, {"q": "They ___ (not/watch) TV - they are sleeping.", "a": "are not watching", "h": "they + negative"}, {"q": "___ he (listen) to music at the moment?", "a": "Is he listening", "h": "question - Is + -ing"}, {"q": "Look! It ___ (snow) outside right now!", "a": "is snowing", "h": "it + now - is snowing"}, {"q": "I ___ (study) for my exam this week.", "a": "am studying", "h": "I + now - am studying"}, {"q": "We ___ (not/go) to the party tonight.", "a": "are not going", "h": "we + negative"}], "error": [{"q": "She is read a book right now on the sofa.", "a": "She is reading", "h": "is + verb-ing"}, {"q": "They are not comes to the meeting today.", "a": "They are not coming", "h": "are + verb-ing"}, {"q": "Is he sleeps in his room right now?", "a": "Is he sleeping", "h": "Is + verb-ing"}, {"q": "I am not understanding this question at all.", "a": "I do not understand", "h": "understand is a state verb - no continuous"}, {"q": "We is waiting for you outside the cafe.", "a": "We are waiting", "h": "we goes with are"}, {"q": "She are working on a big project this month.", "a": "She is working", "h": "she goes with is"}], "trans": [{"ar": "أنا أدرس الآن.", "a": "I am studying right now."}, {"ar": "هي تقرأ كتاباً في الغرفة.", "a": "She is reading a book in the room."}, {"ar": "هل هم ينتظرون بالخارج؟", "a": "Are they waiting outside?"}, {"ar": "لا أذهب إلى الحفلة الليلة.", "a": "I am not going to the party tonight."}, {"ar": "إنها تثلج الآن!", "a": "It is snowing now!"}, {"ar": "هم لا يشاهدون التلفاز.", "a": "They are not watching TV."}]}, {"id": 10, "level": "A2", "icon": "🚀", "title": "Future", "subtitle": "will / going to", "arabic": "المستقبل", "explanation": "<b>will</b> للقرارات اللحظية والتنبؤات. <b>going to</b> للخطط المسبقة.", "formula": "will + base verb | am/is/are + going to + base verb", "examples": ["I <b>will help</b> you with that.", "She <b>is going to study</b> medicine.", "It <b>will</b> probably <b>rain</b> tomorrow."], "fill": [{"q": "I think it ___ rain tomorrow - the sky is dark.", "a": "will", "h": "prediction - will"}, {"q": "She ___ (study) abroad next year - she already booked.", "a": "is going to study", "h": "plan decided - going to"}, {"q": "The phone is ringing - I ___ get it!", "a": "will", "h": "instant decision - will"}, {"q": "They ___ (move) to a new city next month.", "a": "are going to move", "h": "plan already made - going to"}, {"q": "I promise I ___ never forget your birthday.", "a": "will", "h": "promise - will"}, {"q": "Look at those clouds! It ___ (rain).", "a": "is going to rain", "h": "evidence - going to"}], "error": [{"q": "She is going to will help you with the project.", "a": "She is going to help", "h": "don't combine will and going to"}, {"q": "I will to call you tomorrow morning.", "a": "I will call", "h": "will + base verb, no to"}, {"q": "They going to visit Paris next summer.", "a": "They are going to visit", "h": "need are before going to"}, {"q": "He will goes to the gym every morning.", "a": "He will go", "h": "will + base verb, no -s"}, {"q": "We are going visit our family next week.", "a": "We are going to visit", "h": "going to + base verb"}, {"q": "Will she to come to the party tonight?", "a": "Will she come", "h": "Will + base verb, no to"}], "trans": [{"ar": "سأساعدك.", "a": "I will help you."}, {"ar": "ستدرس الطب السنة القادمة.", "a": "She is going to study medicine next year."}, {"ar": "سيمطر غداً على الأرجح.", "a": "It will probably rain tomorrow."}, {"ar": "سينتقلون إلى مدينة جديدة.", "a": "They are going to move to a new city."}, {"ar": "سأرد على الهاتف.", "a": "I will answer the phone."}, {"ar": "انظر! سيسقط الكوب!", "a": "Look! The cup is going to fall!"}]}, {"id": 11, "level": "A2", "icon": "📊", "title": "Comparative & Superlative", "subtitle": "bigger / the biggest", "arabic": "المقارنة والتفضيل", "explanation": "<b>Comparative</b>: adj+er أو more+adj. <b>Superlative</b>: the adj+est أو the most+adj.", "formula": "short adj+-er+than | more+long adj+than | the+adj+-est | the most+long adj", "examples": ["He is <b>taller</b> than his brother.", "This is <b>more interesting</b> than I thought.", "She is <b>the best</b> student."], "fill": [{"q": "This bag is ___ (heavy) than the other one.", "a": "heavier", "h": "heavy - heavier"}, {"q": "That was ___ (bad) film I have ever seen.", "a": "the worst", "h": "superlative of bad - the worst"}, {"q": "She runs ___ (fast) than her sister.", "a": "faster", "h": "fast - faster"}, {"q": "This is ___ (difficult) question in the exam.", "a": "the most difficult", "h": "long adjective - the most"}, {"q": "He is ___ (good) player on the team.", "a": "the best", "h": "superlative of good - the best"}, {"q": "Today is ___ (hot) than yesterday.", "a": "hotter", "h": "hot - hotter (double consonant)"}], "error": [{"q": "She is more tall than her sister.", "a": "She is taller", "h": "short adjective - taller"}, {"q": "This is the most cheap option available.", "a": "the cheapest option", "h": "short adjective - cheapest"}, {"q": "He runs more fast than the other players.", "a": "He runs faster", "h": "fast - faster"}, {"q": "She is the most good student in the class.", "a": "the best student", "h": "good - best (irregular)"}, {"q": "This film is more bored than the last one.", "a": "more boring", "h": "use the adjective, not past participle"}, {"q": "That is the most big building in the city.", "a": "the biggest building", "h": "big - biggest"}], "trans": [{"ar": "هو أطول من أخيه.", "a": "He is taller than his brother."}, {"ar": "هذا أصعب سؤال في الامتحان.", "a": "This is the most difficult question in the exam."}, {"ar": "هي أفضل طالبة في الفصل.", "a": "She is the best student in the class."}, {"ar": "هذه الحقيبة أثقل من تلك.", "a": "This bag is heavier than that one."}, {"ar": "اليوم أحر من أمس.", "a": "Today is hotter than yesterday."}, {"ar": "هذا أسوأ فيلم شاهدته.", "a": "This is the worst film I have ever seen."}]}, {"id": 12, "level": "A2", "icon": "💪", "title": "Can / Can't", "subtitle": "can / cannot", "arabic": "القدرة والعجز", "explanation": "<b>Can</b> للقدرة. لا تضف -s مع he/she. النفي: <b>can't / cannot</b>.", "formula": "subject + can + base verb | subject + can't + base verb | Can + subject + base?", "examples": ["She <b>can</b> speak three languages.", "He <b>can't</b> swim very well.", "<b>Can</b> you help me?"], "fill": [{"q": "She ___ play the piano - she learned when she was five.", "a": "can", "h": "ability - can"}, {"q": "I ___ come to the meeting - I have another appointment.", "a": "can't", "h": "not possible - can't"}, {"q": "___ you explain this word to me please?", "a": "Can", "h": "request - Can"}, {"q": "He ___ speak Arabic very well - he lived there.", "a": "can", "h": "ability - can"}, {"q": "They ___ understand the question - it is too hard.", "a": "can't", "h": "inability - can't"}, {"q": "___ she drive? She looks very young.", "a": "Can", "h": "question about ability - Can"}], "error": [{"q": "She cans speak three languages fluently.", "a": "She can speak", "h": "can never adds -s"}, {"q": "He can to swim very fast in the pool.", "a": "He can swim", "h": "can + base verb, no to"}, {"q": "Can you to help me with this problem?", "a": "Can you help", "h": "Can + base verb, no to"}, {"q": "I can't to understand this grammar rule.", "a": "I can't understand", "h": "can't + base verb, no to"}, {"q": "She cannot speaks English at all.", "a": "She cannot speak", "h": "cannot + base verb, no -s"}, {"q": "They cans not come to the party.", "a": "They cannot come", "h": "use cannot or can't"}], "trans": [{"ar": "تتكلم ثلاث لغات.", "a": "She can speak three languages."}, {"ar": "هل تستطيع مساعدتي؟", "a": "Can you help me?"}, {"ar": "لا أستطيع الحضور.", "a": "I can't come."}, {"ar": "هو يستطيع السباحة بسرعة.", "a": "He can swim very fast."}, {"ar": "لا تستطيعون فهم هذا السؤال.", "a": "You can't understand this question."}, {"ar": "هل تستطيع القيادة؟", "a": "Can you drive?"}]}, {"id": 13, "level": "A2", "icon": "📅", "title": "Prepositions of Time", "subtitle": "at / on / in", "arabic": "حروف جر الزمن", "explanation": "<b>at</b> مع الساعات. <b>on</b> مع الأيام والتواريخ. <b>in</b> مع الشهور والسنوات والفصول.", "formula": "at + time | on + day/date | in + month/year/season", "examples": ["The meeting is <b>at</b> 9 o'clock.", "She was born <b>on</b> a Monday.", "We go skiing <b>in</b> winter."], "fill": [{"q": "The film starts ___ eight o'clock tonight.", "a": "at", "h": "specific time - at"}, {"q": "She was born ___ the 15th of March.", "a": "on", "h": "specific date - on"}, {"q": "They got married ___ 2019.", "a": "in", "h": "year - in"}, {"q": "We always meet ___ Friday evenings.", "a": "on", "h": "day - on"}, {"q": "She loves walking in the park ___ spring.", "a": "in", "h": "season - in"}, {"q": "He arrived ___ midnight - everyone was asleep.", "a": "at", "h": "specific time - at"}], "error": [{"q": "The meeting is in 9 o'clock in the morning.", "a": "at 9 o'clock", "h": "specific time - at"}, {"q": "She was born at the 5th of June.", "a": "on the 5th of June", "h": "date - on"}, {"q": "They met on 2018 in a small cafe.", "a": "in 2018", "h": "year - in"}, {"q": "He usually goes running in Monday mornings.", "a": "on Monday mornings", "h": "day - on"}, {"q": "She always feels happy in Christmas.", "a": "at Christmas", "h": "holidays - at"}, {"q": "The shop opens at the morning at nine.", "a": "in the morning", "h": "morning/afternoon/evening - in"}], "trans": [{"ar": "الاجتماع الساعة التاسعة.", "a": "The meeting is at nine o'clock."}, {"ar": "وُلدت في يوم الاثنين.", "a": "She was born on a Monday."}, {"ar": "نذهب للتزلج في الشتاء.", "a": "We go skiing in winter."}, {"ar": "يلتقيان دائماً يوم الجمعة.", "a": "They always meet on Fridays."}, {"ar": "تزوجا في عام 2020.", "a": "They got married in 2020."}, {"ar": "وصل في منتصف الليل.", "a": "He arrived at midnight."}]}, {"id": 14, "level": "A2", "icon": "📍", "title": "Prepositions of Place", "subtitle": "in / on / at / under", "arabic": "حروف جر المكان", "explanation": "<b>in</b> داخل. <b>on</b> فوق سطح. <b>at</b> لمكان محدد. <b>under</b> تحت.", "formula": "in (inside) | on (surface) | at (specific point) | under | next to / behind", "examples": ["The cat is <b>in</b> the box.", "The book is <b>on</b> the table.", "She is <b>at</b> the airport."], "fill": [{"q": "She lives ___ a small flat near the park.", "a": "in", "h": "inside - in"}, {"q": "The keys are ___ the table - I can see them.", "a": "on", "h": "surface - on"}, {"q": "We will meet you ___ the main entrance.", "a": "at", "h": "specific point - at"}, {"q": "The cat is sleeping ___ the sofa.", "a": "under", "h": "below - under"}, {"q": "The bank is ___ to the post office.", "a": "next", "h": "beside - next to"}, {"q": "He works ___ a hospital in the city centre.", "a": "at", "h": "specific workplace - at"}], "error": [{"q": "She is at the box - I can see her.", "a": "She is in the box", "h": "inside - in"}, {"q": "The book is in the table in the kitchen.", "a": "The book is on the table", "h": "surface - on"}, {"q": "He lives in London in Baker Street.", "a": "at Baker Street", "h": "specific address - at"}, {"q": "The dog is on the bed - please move it.", "a": "under the bed", "h": "below - under"}, {"q": "She was sat in the bus stop waiting.", "a": "at the bus stop", "h": "specific location - at"}, {"q": "The school is in front to the park.", "a": "in front of the park", "h": "in front of, not to"}], "trans": [{"ar": "القطة في الصندوق.", "a": "The cat is in the box."}, {"ar": "الكتاب على الطاولة.", "a": "The book is on the table."}, {"ar": "هي في المطار.", "a": "She is at the airport."}, {"ar": "الكلب تحت السرير.", "a": "The dog is under the bed."}, {"ar": "البنك بجانب البريد.", "a": "The bank is next to the post office."}, {"ar": "يعيش في شقة صغيرة.", "a": "He lives in a small flat."}]}, {"id": 15, "level": "B1", "icon": "✅", "title": "Present Perfect", "subtitle": "have / has + past participle", "arabic": "المضارع التام", "explanation": "للأفعال التي بدأت في الماضي ولا تزال مؤثرة. يُستخدم مع <b>ever, never, just, already, yet</b>.", "formula": "have/has + past participle | haven't/hasn't + pp | Have/Has + subject + pp?", "examples": ["I <b>have visited</b> Japan twice.", "She <b>has never eaten</b> sushi.", "<b>Have</b> you <b>finished</b> yet?"], "fill": [{"q": "She ___ (never/try) sushi in her life.", "a": "has never tried", "h": "she + never - has never tried"}, {"q": "I ___ (just/finish) the report - it is ready.", "a": "have just finished", "h": "I + just - have just finished"}, {"q": "___ you ever (visit) Tokyo?", "a": "Have you ever visited", "h": "question + ever"}, {"q": "He ___ (already/see) this film twice.", "a": "has already seen", "h": "he + already"}, {"q": "They ___ (not/eat) yet - they are still working.", "a": "haven't eaten", "h": "negative + yet"}, {"q": "We ___ (live) here since 2018.", "a": "have lived", "h": "since - present perfect"}], "error": [{"q": "She has never went to Japan before.", "a": "She has never gone", "h": "go - gone (past participle)"}, {"q": "Have you ever went to Paris?", "a": "Have you ever been to Paris", "h": "go - been for places with ever"}, {"q": "I have finished the work yesterday.", "a": "I finished the work yesterday", "h": "yesterday - use past simple"}, {"q": "He has ate all the cake - there is none left.", "a": "He has eaten", "h": "eat - eaten"}, {"q": "They didn't arrived yet - let's wait.", "a": "They haven't arrived yet", "h": "yet - use present perfect"}, {"q": "She have lived here for ten years now.", "a": "She has lived", "h": "she goes with has"}], "trans": [{"ar": "زرتُ اليابان مرتين.", "a": "I have visited Japan twice."}, {"ar": "لم تجرب السوشي قط.", "a": "She has never tried sushi."}, {"ar": "هل أنهيتَ التقرير؟", "a": "Have you finished the report?"}, {"ar": "لقد وصل للتو.", "a": "He has just arrived."}, {"ar": "يعيشون هنا منذ عام 2018.", "a": "They have lived here since 2018."}, {"ar": "لم نأكل بعد.", "a": "We haven't eaten yet."}]}, {"id": 16, "level": "B1", "icon": "💬", "title": "Modal Verbs", "subtitle": "should / must / might", "arabic": "أفعال المودال", "explanation": "<b>should</b> للنصيحة. <b>must</b> للإلزام. <b>might</b> للاحتمال. دائماً + base verb.", "formula": "should/must/might/could/would + base verb (no -s, no to)", "examples": ["You <b>should</b> sleep earlier.", "You <b>must</b> wear a seatbelt.", "She <b>might</b> come tomorrow."], "fill": [{"q": "You ___ eat more vegetables - it is good for you.", "a": "should", "h": "advice - should"}, {"q": "All passengers ___ fasten their seatbelts.", "a": "must", "h": "obligation - must"}, {"q": "It ___ rain this afternoon - take an umbrella.", "a": "might", "h": "possibility - might"}, {"q": "She ___ see a doctor - she has been unwell for days.", "a": "should", "h": "advice - should"}, {"q": "You ___ not park here - it is illegal.", "a": "must", "h": "prohibition - must not"}, {"q": "He ___ be late - the traffic is very bad today.", "a": "might", "h": "possibility - might"}], "error": [{"q": "You should to exercise more regularly.", "a": "You should exercise", "h": "modal + base verb, no to"}, {"q": "She musts wear a uniform at her school.", "a": "She must wear", "h": "must never adds -s"}, {"q": "He might comes to the party tonight.", "a": "He might come", "h": "modal + base verb, no -s"}, {"q": "You shouldn't to eat so much sugar every day.", "a": "You shouldn't eat", "h": "shouldn't + base verb, no to"}, {"q": "They must to leave before midnight tonight.", "a": "They must leave", "h": "must + base verb, no to"}, {"q": "She could to speak French when she was younger.", "a": "She could speak", "h": "could + base verb, no to"}], "trans": [{"ar": "يجب أن تنام مبكراً.", "a": "You should sleep earlier."}, {"ar": "يجب على جميع الركاب ارتداء حزام الأمان.", "a": "All passengers must wear a seatbelt."}, {"ar": "قد يأتي غداً.", "a": "He might come tomorrow."}, {"ar": "يجب أن تزور طبيباً.", "a": "You should see a doctor."}, {"ar": "لا يجوز الوقوف هنا.", "a": "You must not park here."}, {"ar": "قد تمطر الليلة.", "a": "It might rain tonight."}]}, {"id": 17, "level": "B1", "icon": "🔀", "title": "Passive Voice", "subtitle": "is made / was built", "arabic": "المبني للمجهول", "explanation": "عندما يكون الفاعل غير مهم أو غير معروف. الصيغة: <b>be + past participle</b>.", "formula": "am/is/are + pp (present) | was/were + pp (past) | by + agent (optional)", "examples": ["English <b>is spoken</b> worldwide.", "The bridge <b>was built</b> in 1920.", "The cake <b>was eaten</b> by the children."], "fill": [{"q": "This car ___ (make) in Germany in 2022.", "a": "was made", "h": "past passive - was made"}, {"q": "English ___ (speak) by millions of people.", "a": "is spoken", "h": "present passive - is spoken"}, {"q": "The letter ___ (write) by the manager.", "a": "was written", "h": "past passive - was written"}, {"q": "The new bridge ___ (build) last year.", "a": "was built", "h": "past passive - was built"}, {"q": "These shoes ___ (design) in Italy.", "a": "were designed", "h": "plural past passive"}, {"q": "The report ___ (send) to all staff this morning.", "a": "was sent", "h": "past passive - was sent"}], "error": [{"q": "The cake was ate by all the children.", "a": "was eaten", "h": "eat - eaten (past participle)"}, {"q": "English is speak by millions around the world.", "a": "is spoken", "h": "speak - spoken"}, {"q": "The bridge was build over fifty years ago.", "a": "was built", "h": "build - built"}, {"q": "The letter were written by the director.", "a": "was written", "h": "singular - was, not were"}, {"q": "Many houses was destroyed in the storm.", "a": "Many houses were destroyed", "h": "plural - were, not was"}, {"q": "This car is make in Japan.", "a": "is made", "h": "make - made"}], "trans": [{"ar": "تُصنع هذه السيارة في ألمانيا.", "a": "This car is made in Germany."}, {"ar": "تُتكلم الإنجليزية في كل أنحاء العالم.", "a": "English is spoken all over the world."}, {"ar": "بُني الجسر منذ خمسين عاماً.", "a": "The bridge was built fifty years ago."}, {"ar": "كُتبت الرسالة من قِبَل المدير.", "a": "The letter was written by the manager."}, {"ar": "أُرسل التقرير إلى جميع الموظفين.", "a": "The report was sent to all staff."}, {"ar": "دُمّرت كثير من المنازل في العاصفة.", "a": "Many houses were destroyed in the storm."}]}, {"id": 18, "level": "B1", "icon": "🔵", "title": "First Conditional", "subtitle": "If + present, will + base", "arabic": "الشرط الأول", "explanation": "للمواقف الحقيقية المستقبلية. <b>If + present simple, will + base</b>.", "formula": "If + present simple, will + base verb", "examples": ["<b>If</b> it rains, I <b>will</b> stay home.", "She <b>will</b> pass <b>if</b> she studies hard.", "<b>If</b> you need help, I <b>will</b> be there."], "fill": [{"q": "If she ___ (study) hard, she will pass the exam.", "a": "studies", "h": "If clause - present simple"}, {"q": "If it ___ (be) cold tomorrow, we will stay inside.", "a": "is", "h": "If clause - present simple"}, {"q": "She will miss the bus if she ___ (not/hurry).", "a": "doesn't hurry", "h": "If clause - negative"}, {"q": "If you touch that wire, you ___ (get) an electric shock.", "a": "will get", "h": "result - will + base"}, {"q": "I will call you if I ___ (need) anything.", "a": "need", "h": "If clause - present simple"}, {"q": "If they ___ (not/leave) now, they will be late.", "a": "don't leave", "h": "If clause - present simple"}], "error": [{"q": "If she will study hard, she will pass.", "a": "If she studies hard", "h": "If clause - present simple, no will"}, {"q": "If it rains, I will stayed at home.", "a": "I will stay", "h": "will + base verb, not past"}, {"q": "She will pass if she will study hard.", "a": "if she studies hard", "h": "If clause - present simple"}, {"q": "If you will be late, please call me.", "a": "If you are late", "h": "If clause - present simple"}, {"q": "I will help you if you asked me nicely.", "a": "if you ask me", "h": "If clause - present simple"}, {"q": "If he don't arrive soon, we will leave.", "a": "If he doesn't arrive", "h": "he - doesn't"}], "trans": [{"ar": "إذا أمطرت، سأبقى في البيت.", "a": "If it rains, I will stay at home."}, {"ar": "ستنجح إذا درست بجد.", "a": "She will pass if she studies hard."}, {"ar": "إذا أسرعت، ستلحق بالحافلة.", "a": "If you hurry, you will catch the bus."}, {"ar": "إذا احتجتَ مساعدة، سأكون هنا.", "a": "If you need help, I will be there."}, {"ar": "إذا لم يغادروا الآن، سيتأخرون.", "a": "If they don't leave now, they will be late."}, {"ar": "سأتصل بك إذا احتجتُ أي شيء.", "a": "I will call you if I need anything."}]}, {"id": 19, "level": "B1", "icon": "🔗", "title": "Relative Clauses", "subtitle": "who / which / that", "arabic": "الجمل الوصفية", "explanation": "<b>who</b> للأشخاص. <b>which</b> للأشياء. <b>that</b> للأشخاص والأشياء.", "formula": "noun + who + verb (person) | noun + which/that + verb (thing)", "examples": ["The man <b>who</b> called is my uncle.", "The book <b>which</b> I read was amazing.", "The car <b>that</b> she drives is red."], "fill": [{"q": "The woman ___ lives next door is a doctor.", "a": "who", "h": "woman - person - who"}, {"q": "I love the dress ___ she bought last week.", "a": "which/that", "h": "dress - thing - which/that"}, {"q": "The students ___ passed the exam were very happy.", "a": "who", "h": "students - people - who"}, {"q": "The film ___ we watched last night was brilliant.", "a": "which/that", "h": "film - thing"}, {"q": "Do you know the man ___ is standing by the door?", "a": "who", "h": "man - person - who"}, {"q": "That is the hotel ___ we stayed in last summer.", "a": "which/that", "h": "hotel - thing"}], "error": [{"q": "The woman which lives next door is a nurse.", "a": "The woman who lives", "h": "person - use who, not which"}, {"q": "I like the dress who she wore to the party.", "a": "the dress which she wore", "h": "thing - use which, not who"}, {"q": "The man who he works here is very kind.", "a": "The man who works here", "h": "don't repeat the pronoun after who"}, {"q": "The book which it I read was very boring.", "a": "The book which I read", "h": "don't add it after which"}, {"q": "She is the student which won first prize.", "a": "the student who won", "h": "person - who, not which"}, {"q": "The car that she drives it is very fast.", "a": "The car that she drives", "h": "don't add it - relative pronoun replaces it"}], "trans": [{"ar": "الرجل الذي اتصل هو عمي.", "a": "The man who called is my uncle."}, {"ar": "الكتاب الذي قرأته كان رائعاً.", "a": "The book which I read was amazing."}, {"ar": "المرأة التي تسكن بجانبنا طبيبة.", "a": "The woman who lives next door is a doctor."}, {"ar": "الفيلم الذي شاهدناه أمس كان ممتعاً.", "a": "The film that we watched yesterday was great."}, {"ar": "هل تعرف الشخص الذي يقف عند الباب؟", "a": "Do you know the person who is standing by the door?"}, {"ar": "هذا هو الفندق الذي بقينا فيه.", "a": "That is the hotel that we stayed in."}]}, {"id": 20, "level": "B1", "icon": "🔁", "title": "Adverbs of Frequency", "subtitle": "always / usually / never", "arabic": "ظروف التكرار", "explanation": "تأتي <b>قبل الفعل الرئيسي</b>، لكن <b>بعد</b> be/am/is/are.", "formula": "subject + adverb + main verb | subject + be + adverb", "examples": ["She <b>always</b> arrives on time.", "He is <b>never</b> late.", "I <b>sometimes</b> eat out."], "fill": [{"q": "She ___ arrives on time for meetings.", "a": "always", "h": "before main verb - always arrives"}, {"q": "He is ___ rude to anyone at work.", "a": "never", "h": "after is - is never"}, {"q": "I ___ eat lunch at my desk.", "a": "sometimes", "h": "before main verb - sometimes eat"}, {"q": "They are ___ home by six o'clock.", "a": "usually", "h": "after are - are usually"}, {"q": "She ___ makes a mistake in her work.", "a": "rarely", "h": "before main verb - rarely makes"}, {"q": "He is ___ happy when he sees his dog.", "a": "always", "h": "after is - is always"}], "error": [{"q": "She arrives always on time for the meeting.", "a": "She always arrives on time", "h": "adverb before the main verb"}, {"q": "He is late never for work.", "a": "He is never late", "h": "after is - is never late"}, {"q": "They usually are home before dinner.", "a": "They are usually home", "h": "after be verb - are usually"}, {"q": "I eat sometimes lunch outside the office.", "a": "I sometimes eat lunch", "h": "before main verb - sometimes eat"}, {"q": "She sometimes is tired in the afternoon.", "a": "She is sometimes tired", "h": "after is - is sometimes"}, {"q": "He drinks never coffee in the evening.", "a": "He never drinks coffee", "h": "before main verb - never drinks"}], "trans": [{"ar": "هي دائماً تصل في الوقت.", "a": "She always arrives on time."}, {"ar": "هو لا يتأخر أبداً.", "a": "He is never late."}, {"ar": "أحياناً آكل بالخارج.", "a": "I sometimes eat out."}, {"ar": "عادةً يكونون في البيت قبل السادسة.", "a": "They are usually home before six."}, {"ar": "هي نادراً ما ترتكب خطأ.", "a": "She rarely makes a mistake."}, {"ar": "هو دائماً سعيد عندما يرى كلبه.", "a": "He is always happy when he sees his dog."}]}, {"id": 21, "level": "B2", "icon": "⏮", "title": "Past Perfect", "subtitle": "had + past participle", "arabic": "الماضي التام", "explanation": "لحدث حدث <b>قبل</b> حدث آخر في الماضي. الصيغة: <b>had + past participle</b>.", "formula": "had + past participle | hadn't + pp | Had + subject + pp?", "examples": ["She <b>had left</b> before he arrived.", "By noon, they <b>had finished</b> the work.", "He <b>hadn't eaten</b> all day."], "fill": [{"q": "She ___ (already/leave) when he arrived.", "a": "had already left", "h": "before another event - had left"}, {"q": "By the time we arrived, the film ___ (start).", "a": "had already started", "h": "before - had started"}, {"q": "He was tired because he ___ (not/sleep) all night.", "a": "hadn't slept", "h": "before - hadn't slept"}, {"q": "She discovered that she ___ (lose) her wallet.", "a": "had lost", "h": "before the discovery - had lost"}, {"q": "___ you (ever/try) Thai food before that trip?", "a": "Had you ever tried", "h": "before - Had + pp"}, {"q": "By 2020, she ___ (live) there for ten years.", "a": "had lived", "h": "duration before - had lived"}], "error": [{"q": "She has left before he arrived at the party.", "a": "She had left", "h": "before another past event - had left"}, {"q": "By the time I arrived, they finished the meal.", "a": "they had finished", "h": "completed before - had finished"}, {"q": "He hadn't ate anything before the meeting.", "a": "hadn't eaten", "h": "eat - eaten"}, {"q": "She discovered that she loosed her passport.", "a": "she had lost", "h": "use past perfect for earlier event"}, {"q": "Had you ever try sushi before visiting Japan?", "a": "Had you ever tried", "h": "Had + past participle"}, {"q": "They were disappointed because they lose the match.", "a": "they had lost", "h": "before feeling - had lost"}], "trans": [{"ar": "كانت قد غادرت قبل أن يصل.", "a": "She had left before he arrived."}, {"ar": "بحلول الظهر أنهوا العمل.", "a": "By noon, they had finished the work."}, {"ar": "لم يكن قد نام طوال الليل.", "a": "He hadn't slept all night."}, {"ar": "اكتشفت أنها فقدت محفظتها.", "a": "She discovered that she had lost her wallet."}, {"ar": "هل جربتَ الطعام التايلاندي من قبل؟", "a": "Had you ever tried Thai food before?"}, {"ar": "بحلول 2020 كانت تسكن هناك منذ عشر سنوات.", "a": "By 2020, she had lived there for ten years."}]}, {"id": 22, "level": "B2", "icon": "🌙", "title": "Second Conditional", "subtitle": "If + past, would + base", "arabic": "الشرط الثاني", "explanation": "للمواقف الخيالية أو غير المحتملة. <b>If + past simple, would + base</b>.", "formula": "If + past simple, would + base verb", "examples": ["<b>If</b> I had more time, I <b>would</b> travel more.", "She <b>would</b> be happier <b>if</b> she exercised.", "<b>If</b> he worked harder, he <b>would</b> succeed."], "fill": [{"q": "If I ___ (have) more money, I would travel the world ن مفعول به. <b>tell</b> مع مفعول به.", "formula": "say>said | will>would | is>was | have>had | can>could | tell + person", "examples": ["\"I am tired.\" - She said she <b>was</b> tired.", "\"I will help.\" - He said he <b>would</b> help.", "\"I can swim.\" - She said she <b>could</b> swim."], "fill": [{"q": "\"I am hungry.\" - She said she ___ hungry.", "a": "was", "h": "am becomes was"}, {"q": "\"I will come.\" - He said he ___ come.", "a": "would", "h": "will becomes would"}, {"q": "\"I can help.\" - She said she ___ help.", "a": "could", "h": "can becomes could"}, {"q": "\"I have finished.\" - He said he ___ finished.", "a": "had", "h": "have becomes had"}, {"q": "\"I live here.\" - She told me she ___ there.", "a": "lived", "h": "live becomes lived"}, {"q": "\"We are leaving.\" - They said they ___ leaving.", "a": "were", "h": "are becomes were"}], "error": [{"q": "She said me that she was tired.", "a": "She told me that she was tired", "h": "tell + person, not say + person"}, {"q": "He said that he will come to the party.", "a": "he would come", "h": "will becomes would"}, {"q": "She told that she could speak French.", "a": "She told me that", "h": "tell needs a person: told me"}, {"q": "He said he can swim very well.", "a": "he could swim", "h": "can becomes could"}, {"q": "They said they are leaving tomorrow.", "a": "they were leaving", "h": "are becomes were"}, {"q": "She said me that she had finished.", "a": "She told me that", "h": "say has no object; tell needs one"}], "trans": [{"ar": "قالت إنها متعبة.", "a": "She said that she was tired."}, {"ar": "قال إنه سيساعد.", "a": "He said that he would help."}, {"ar": "أخبرتني أنها تستطيع السباحة.", "a": "She told me that she could swim."}, {"ar": "قالوا إنهم يغادرون.", "a": "They said that they were leaving."}, {"ar": "أخبرها أنه أنهى العمل.", "a": "He told her that he had finished the work."}, {"ar": "قالت إنها تعيش هناك.", "a": "She said that she lived there."}]}, {"id": 24, "level": "B2", "icon": "🎯", "title": "Gerunds vs Infinitives", "subtitle": "enjoy doing / want to do", "arabic": "المصدر بصيغتيه", "explanation": "بعض الأفعال تتبعها <b>-ing</b>، وبعضها <b>to + base</b>.", "formula": "enjoy/avoid/finish/mind + -ing | want/need/decide/plan + to + base", "examples": ["She enjoys <b>reading</b> every night.", "He decided <b>to study</b> medicine.", "They avoided <b>making</b> any noise."], "fill": [{"q": "She enjoys ___ (read) mystery novels.", "a": "reading", "h": "enjoy - -ing"}, {"q": "He decided ___ (study) medicine at university.", "a": "to study", "h": "decide - to + base"}, {"q": "They finished ___ (paint) the whole house.", "a": "painting", "h": "finish - -ing"}, {"q": "She wants ___ (travel) to Japan next year.", "a": "to travel", "h": "want - to + base"}, {"q": "He avoids ___ (eat) too much sugar daily.", "a": "eating", "h": "avoid - -ing"}, {"q": "They plan ___ (move) to a new city.", "a": "to move", "h": "plan - to + base"}], "error": [{"q": "She enjoys to read mystery novels every night.", "a": "enjoys reading", "h": "enjoy - -ing, not to"}, {"q": "He decided studying medicine at university.", "a": "decided to study", "h": "decide - to + base"}, {"q": "They finished to paint the whole house.", "a": "finished painting", "h": "finish - -ing"}, {"q": "She wants travelling to Japan next summer.", "a": "wants to travel", "h": "want - to + base"}, {"q": "He avoids to eat too much processed food.", "a": "avoids eating", "h": "avoid - -ing"}, {"q": "She suggested to go to the new restaurant.", "a": "suggested going", "h": "suggest - -ing"}], "trans": [{"ar": "تستمتع بقراءة الروايات.", "a": "She enjoys reading novels."}, {"ar": "قرر دراسة الطب.", "a": "He decided to study medicine."}, {"ar": "أنهوا رسم البيت كله.", "a": "They finished painting the whole house."}, {"ar": "تريد السفر إلى اليابان.", "a": "She wants to travel to Japan."}, {"ar": "يتجنب أكل الكثير من السكر.", "a": "He avoids eating too much sugar."}, {"ar": "يخططون للانتقال إلى مدينة جديدة.", "a": "They plan to move to a new city."}]}, {"id": 25, "level": "B2", "icon": "🧩", "title": "Phrasal Verbs", "subtitle": "give up / look after / find out", "arabic": "الأفعال المركبة", "explanation": "الفعل المركب = فعل + حرف جر، ومعناه مختلف عن الفعل الأصلي.", "formula": "verb + particle = new meaning (give up = quit | look after = care for)", "examples": ["She <b>gave up</b> smoking last year.", "He <b>looks after</b> his elderly mother.", "I need to <b>find out</b> the answer."], "fill": [{"q": "She ___ smoking last year - she is much healthier now.", "a": "gave up", "h": "give up = quit"}, {"q": "He ___ his little sister while their parents were away.", "a": "looked after", "h": "look after = care for"}, {"q": "Can you ___ what time the film starts?", "a": "find out", "h": "find out = discover"}, {"q": "The meeting was ___ due to the bad weather.", "a": "called off", "h": "call off = cancel"}, {"q": "She ___ a new hobby - she started painting last month.", "a": "took up", "h": "take up = start a new activity"}, {"q": "He ___ the job offer - it was not a good opportunity.", "a": "turned down", "h": "turn down = refuse"}], "error": [{"q": "She gave up to smoke last year.", "a": "gave up smoking", "h": "give up - -ing, not to"}, {"q": "He looks after of his elderly parents.", "a": "looks after his elderly parents", "h": "look after - no of"}, {"q": "I need to find out about the answer.", "a": "find out the answer", "h": "find out - direct object, no preposition"}, {"q": "The meeting was called out because of rain.", "a": "called off", "h": "call off = cancel, not call out"}, {"q": "She took on a new hobby last month.", "a": "took up", "h": "take up = start new activity"}, {"q": "He turned away the job offer.", "a": "turned down", "h": "turn down = reject, not turn away"}], "trans": [{"ar": "تركت التدخين السنة الماضية.", "a": "She gave up smoking last year."}, {"ar": "يعتني بأمه.", "a": "He looks after his mother."}, {"ar": "أحتاج أن أكتشف وقت بداية الفيلم.", "a": "I need to : "أصلحت سيارتها في الورشة.", "a": "She had her car repaired at the garage."}, {"ar": "يجب إنجاز هذا العمل فوراً.", "a": "This must be done immediately."}, {"ar": "دهنوا البيت في الربيع.", "a": "They had the house painted in spring."}, {"ar": "ستُعلن النتائج غداً.", "a": "The results will be announced tomorrow."}, {"ar": "يجب معالجة هذه المشكلة بسرعة.", "a": "This problem must be addressed quickly."}, {"ar": "تفحص عينيها كل سنة.", "a": "She has her eyes tested every year."}]}, {"id": 27, "level": "C1", "icon": "⏰", "title": "Third Conditional", "subtitle": "had done + would have done", "arabic": "الشرط الثالث", "explanation": "لمواقف خيالية في <b>الماضي</b> - ما كان يمكن أن يحدث لو كان الأمر مختلفاً.", "formula": "If + had + pp, would have + pp", "examples": ["<b>If</b> I had studied, I <b>would have passed</b>.", "She <b>would have come</b> if she had known.", "If it hadn't rained, we <b>would have gone</b>."], "fill": [{"q": "If I ___ (study) harder, I would have passed.", "a": "had studied", "h": "If + had + pp"}, {"q": "She would have come if she ___ (know).", "a": "had known", "h": "If + had + pp"}, {"q": "If it ___ (not/rain), we would have gone out.", "a": "hadn't rained", "h": "If + hadn't + pp"}, {"q": "They would have won if they ___ (play) better.", "a": "had played", "h": "If + had + pp"}, {"q": "If she ___ (arrive) earlier, she would have met him.", "a": "had arrived", "h": "If + had + pp"}, {"q": "I would have called you if I ___ (have) your number.", "a": "had had", "h": "If + had + pp"}], "error": [{"q": "If I would have studied, I would have passed.", "a": "If I had studied", "h": "If clause: had + pp, no would"}, {"q": "She would came if she had known about it.", "a": "would have come", "h": "would have + pp"}, {"q": "If it didn't rain, we would have gone out.", "a": "If it hadn't rained", "h": "If clause: hadn't + pp"}, {"q": "They would have won if they played better.", "a": "if they had played", "h": "If clause: had + pp"}, {"q": "If she arrived
