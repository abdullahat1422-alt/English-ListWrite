<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ListWrite">
<meta name="theme-color" content="#5b8c74">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ListenWrite — اكتب ما تسمع</title>
<script src="words_db.js"></script>
<script src="words_extra.js"></script>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design Tokens ── */
:root {
  --bg:           #faf8f5;
  --bg-2:         #f2ede5;
  --surface:      #ffffff;
  --accent:       #5b8c74;
  --accent-tint:  #e6f0eb;
  --accent-deep:  #3a6652;
  --text:         #26211b;
  --text-2:       #6a5c52;
  --text-3:       #a89585;
  --border:       #e6ddd3;
  --border-2:     #d0c5b8;
  --success:      #3d8f68;
  --success-tint: #e6f5ee;
  --error:        #c04848;
  --error-tint:   #fdeaea;

  --font-arabic:  'Amiri', 'Traditional Arabic', serif;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'DM Sans', -apple-system, sans-serif;

  --ease-out:    cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

  --shadow-md: 0 8px 32px rgba(38, 33, 27, 0.09), 0 2px 8px rgba(38, 33, 27, 0.05);
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 24px 16px;
}

/* Center the practice card vertically but not the topic grid */
body.practice-mode {
  justify-content: center;
}

.hidden { display: none !important; }

/* ── Progress bar ── */
.progress-track {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--border);
  z-index: 10;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #82b89e);
  border-radius: 0 2px 2px 0;
  transition: width 0.55s var(--ease-out);
  width: 0%;
}

/* ── Counter ── */
.counter {
  position: fixed;
  top: 14px;
  right: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.06em;
  z-index: 10;
}

/* ── Scene & Card ── */
.scene {
  width: 100%;
  max-width: 580px;
}

.card {
  background: var(--surface);
  border-radius: 28px;
  padding: 52px 52px 44px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* top accent stripe */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-tint), var(--accent), var(--accent-tint));
}

/* ── Audio controls row ── */
.audio-controls {
  position: absolute;
  top: 16px;
  left: 16px;
  display: flex;
  gap: 6px;
  align-items: center;
}

/* ── Speaker button ── */
.speaker-btn {
  position: relative;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--text-3);
  transition: all 0.18s var(--ease-out);
}
.speaker-btn .key-hint {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--text-3);
  line-height: 1;
  font-family: var(--font-body);
  transition: color 0.18s ease;
}
.speaker-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-tint);
  transform: scale(1.07);
}
.speaker-btn:hover .key-hint { color: var(--accent); }
.speaker-btn.playing {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-tint);
  animation: pulse-ring 1.1s ease infinite;
}
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0px rgba(91,140,116,0.35); }
  70%  { box-shadow: 0 0 0 9px rgba(91,140,116,0); }
  100% { box-shadow: 0 0 0 0px rgba(91,140,116,0); }
}

/* smaller secondary audio buttons */
.slow-btn, .sentence-btn {
  width: 36px;
  height: 36px;
  opacity: 0.75;
}
.slow-btn:hover, .sentence-btn:hover { opacity: 1; }

/* accent flag toggle */
.accent-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s var(--ease-out);
  opacity: 0.8;
  line-height: 1;
}
.accent-btn:hover {
  border-color: var(--accent);
  background: var(--accent-tint);
  opacity: 1;
  transform: scale(1.07);
}

/* ── Back button ── */
.back-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px 6px 10px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  color: var(--text-3);
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 600;
  transition: all 0.18s var(--ease-out);
  z-index: 5;
}
.back-btn:hover {
  border-color: var(--border-2);
  color: var(--text-2);
  background: var(--bg);
  transform: translateX(-2px);
}
.back-label { letter-spacing: 0.01em; }

/* ── Arabic section ── */
.arabic-section {
  direction: rtl;
  margin-bottom: 36px;
  animation: fadeUp 0.45s var(--ease-out) both;
}
.arabic-word {
  font-family: var(--font-arabic);
  font-size: clamp(2.4rem, 6vw, 3.4rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 14px;
}
.arabic-def {
  font-family: var(--font-arabic);
  font-size: 1.08rem;
  color: var(--text-2);
  line-height: 1.8;
  font-weight: 400;
}

/* ── Divider ── */
.divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0 auto 36px;
}
.divider-line-top {
  width: 1px;
  height: 28px;
  background: linear-gradient(to bottom, transparent, var(--border-2));
}
.divider-line-bottom {
  width: 1px;
  height: 28px;
  background: linear-gradient(to bottom, var(--border-2), transparent);
}
.divider-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--border-2);
}

/* ── English sentence ── */
.english-section {
  animation: fadeUp 0.45s 0.1s var(--ease-out) both;
}

.sentence-wrap {
  font-family: var(--font-display);
  font-size: clamp(1rem, 2.5vw, 1.18rem);
  font-style: italic;
  color: var(--text-2);
  line-height: 2.1;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 3px;
  min-height: 52px;
}

/* Inline input — the star of the show */
.word-input {
  font-family: var(--font-body);
  font-size: 1rem;
  font-style: normal;
  font-weight: 600;
  color: var(--text);
  background: transparent;
  border: none;
  border-bottom: 2.5px solid var(--border-2);
  outline: none;
  text-align: center;
  padding: 2px 6px 3px;
  min-width: 60px;
  border-radius: 0;
  transition: border-color 0.2s ease, color 0.2s ease,
              background 0.2s ease, border-radius 0.2s ease;
  caret-color: var(--accent);
  letter-spacing: 0.02em;
}
.word-input::placeholder { color: var(--border-2); }
.word-input:focus         { border-bottom-color: var(--accent); }

.word-input.correct {
  color: var(--success);
  border-bottom-color: var(--success);
  background: var(--success-tint);
  border-radius: 6px;
  padding: 2px 10px 3px;
}
.word-input.wrong {
  color: var(--error);
  border-bottom-color: var(--error);
  animation: shake 0.4s var(--ease-out) both;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  15%     { transform: translateX(-7px); }
  35%     { transform: translateX(7px); }
  55%     { transform: translateX(-5px); }
  75%     { transform: translateX(4px); }
}

/* ── EAP Copy Mode ── */
.eap-sentence {
  font-size: 1rem;
  line-height: 1.75;
  direction: ltr;
  text-align: left;
  padding: 14px 4px 6px;
  letter-spacing: 0.01em;
}
.eap-ghost {
  color: var(--border-2);
}
.eap-phrase-hl {
  color: var(--accent-deep);
  opacity: 0.55;
  font-weight: 700;
  border-bottom: 2px dotted var(--accent);
}
.eap-input-wrap {
  margin-top: 18px;
  display: flex;
  justify-content: center;
}
.eap-input-wrap .word-input {
  width: 100%;
  max-width: 360px;
  text-align: left;
  font-size: 0.95rem;
  direction: ltr;
}

/* ── Hint: correct word ── */
.correct-word-hint {
  margin-top: 14px;
  font-size: 0.9rem;
  color: var(--text-3);
  animation: fadeIn 0.3s ease;
  line-height: 1.5;
}
.correct-word-hint strong {
  color: var(--text);
  font-weight: 600;
  font-family: var(--font-body);
  background: var(--bg-2);
  padding: 1px 8px;
  border-radius: 4px;
}

/* ── Status line ── */
.status {
  margin-top: 18px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: color 0.2s ease;
}
.status.hint-msg    { color: var(--text-3); font-weight: 400; }
.status.success-msg { color: var(--success); }
.status.error-msg   { color: var(--error); }

/* ── Card transitions ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes slideOutLeft {
  to { opacity: 0; transform: translateX(-36px) scale(0.97); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px) scale(0.98); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
.card.exit  { animation: slideOutLeft 0.28s var(--ease-out) forwards; }
.card.enter { animation: slideInRight 0.38s var(--ease-out) both; }

/* ── Completion screen ── */
.done-card {
  background: var(--surface);
  border-radius: 28px;
  padding: 60px 48px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
  text-align: center;
  animation: fadeUp 0.5s var(--ease-out) both;
}
.done-icon {
  width: 76px;
  height: 76px;
  background: var(--accent-tint);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  font-size: 2.2rem;
}
.done-title {
  font-family: var(--font-arabic);
  font-size: 2.8rem;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
}
.done-sub-en {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.1rem;
  color: var(--text-2);
  margin-bottom: 8px;
}
.done-sub {
  font-size: 0.88rem;
  color: var(--text-3);
  margin-bottom: 36px;
}
.btn-restart {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 32px;
  border-radius: 9999px;
  border: none;
  background: var(--accent);
  color: white;
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(91,140,116,0.30);
  transition: all 0.18s var(--ease-out);
  letter-spacing: 0.02em;
}
.btn-restart:hover  { opacity: 0.88; transform: translateY(-2px); }
.btn-restart:active { transform: scale(0.97); }

/* ── Level badge & back link ── */
.level-nav {
  position: fixed;
  top: 14px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
}
.back-link {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-3);
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: color 0.18s ease;
}
.back-link:hover { color: var(--accent); }
.level-badge {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 9999px;
  background: var(--accent-tint);
  color: var(--accent-deep);
}

/* ── Topic Selector ── */
.topic-selector-wrap {
  width: 100%;
  max-width: 580px;
  padding-top: 52px;
}
.topic-header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeUp 0.4s var(--ease-out) both;
}
.topic-header-label {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 8px;
}
.topic-header-title {
  font-family: var(--font-arabic);
  font-size: clamp(1.3rem, 4vw, 1.8rem);
  font-weight: 700;
  color: var(--text);
  direction: rtl;
}
.topic-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
}
.topic-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 16px 14px 14px;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: transform 0.2s var(--ease-out),
              box-shadow 0.2s var(--ease-out),
              border-color 0.2s ease;
  animation: fadeUp 0.4s var(--ease-out) both;
  box-shadow: 0 2px 6px rgba(38,33,27,0.05);
}
.topic-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(38,33,27,0.10);
  border-color: var(--accent);
}
.topic-card:hover .topic-card-en { color: var(--accent); }
.topic-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.topic-emoji { font-size: 1.35rem; line-height: 1; }
.topic-order {
  font-family: var(--font-body);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--accent-deep);
  background: var(--accent-tint);
  padding: 2px 7px;
  border-radius: 9999px;
  line-height: 1.6;
  transition: background 0.18s ease, color 0.18s ease;
}
.topic-card:hover .topic-order { background: var(--accent); color: #fff; }

/* Bilingual topic name */
.topic-card-ar {
  font-family: var(--font-arabic);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  direction: rtl;
  text-align: right;
}
.topic-card-en {
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-3);
  direction: ltr;
  text-align: left;
  letter-spacing: 0.01em;
  transition: color 0.18s ease;
}
.topic-card-count {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-3);
  letter-spacing: 0.04em;
  direction: ltr;
  margin-top: 4px;
}
/* Resume row inside topic card */
.resume-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.resume-btn {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: background 0.15s ease, transform 0.15s ease;
  white-space: nowrap;
}
.resume-btn:hover { background: var(--accent-deep); transform: scale(1.04); }
.restart-link {
  font-size: 0.63rem;
  color: var(--text-3);
  text-decoration: none;
}
.restart-link:hover { color: var(--text-2); text-decoration: underline; }

/* Completed topic card */
.topic-card-done {
  border-color: var(--success);
  background: var(--success-tint);
}
.topic-card-done .topic-card-ar,
.topic-card-done .topic-card-en { color: var(--success); }

/* stagger grid animations */
.topic-card:nth-child(1)  { animation-delay: 0.04s; }
.topic-card:nth-child(2)  { animation-delay: 0.08s; }
.topic-card:nth-child(3)  { animation-delay: 0.12s; }
.topic-card:nth-child(4)  { animation-delay: 0.16s; }
.topic-card:nth-child(5)  { animation-delay: 0.20s; }
.topic-card:nth-child(6)  { animation-delay: 0.24s; }
.topic-card:nth-child(7)  { animation-delay: 0.28s; }
.topic-card:nth-child(8)  { animation-delay: 0.32s; }
.topic-card:nth-child(9)  { animation-delay: 0.36s; }
.topic-card:nth-child(10) { animation-delay: 0.40s; }

/* ── Touch — eliminate 300ms delay on all interactive elements ── */
button, a, .topic-card, .word-btn {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  /* Body — flex-start so card stays visible when keyboard opens */
  body { padding: 16px 12px; }
  body.practice-mode { justify-content: flex-start; padding-top: 28px; }

  /* Practice card */
  .card { padding: 44px 18px 32px; border-radius: 20px; }
  .arabic-section { margin-bottom: 22px; }
  .arabic-word { font-size: clamp(1.9rem, 9vw, 2.8rem); }
  .arabic-def  { font-size: 0.92rem; }
  .divider { margin-bottom: 22px; }
  .sentence-wrap { font-size: 0.92rem; gap: 2px; line-height: 2; }
  .word-input { max-width: calc(100vw - 72px); }

  /* Audio controls — smaller on mobile */
  .speaker-btn { width: 38px; height: 38px; }
  .slow-btn, .sentence-btn { width: 30px; height: 30px; }
  .accent-btn  { width: 30px; height: 30px; font-size: 0.85rem; }
  .key-hint    { display: none; }    /* hide keyboard hints on mobile */

  /* Counter position */
  .counter { right: 12px; top: 10px; }

  /* Completion screen */
  .done-card  { padding: 36px 20px 32px; border-radius: 20px; }
  .done-title { font-size: 2.1rem; }
  .done-icon  { width: 60px; height: 60px; font-size: 1.7rem; margin-bottom: 16px; }
  .btn-restart { padding: 11px 18px; font-size: 0.82rem; }

  /* Topic selector */
  .topic-selector-wrap { padding-top: 40px; }
  .topic-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .topic-card { padding: 12px 10px 10px; }
  .topic-card-ar { font-size: 0.88rem; }
  .topic-card-count { font-size: 0.65rem; }

  /* Auth overlay */
  .auth-card { padding: 36px 20px 32px; border-radius: 20px; }
}

@media (max-width: 360px) {
  .topic-grid { grid-template-columns: 1fr; }
  .audio-controls { gap: 4px; }
  .speaker-btn { width: 34px; height: 34px; }
  .slow-btn, .sentence-btn, .accent-btn { width: 28px; height: 28px; }
}

/* ── iOS / iPadOS Safe-Area & PWA Enhancements ── */
/* Use dvh so Safari's dynamic toolbar doesn't clip the layout */
body {
  min-height: 100dvh;
  /* Safe area padding for iPhone notch / Dynamic Island */
  padding-bottom: env(safe-area-inset-bottom);
}
/* Don't double-add bottom padding during practice — card is centered */
body.practice-mode {
  padding-bottom: max(env(safe-area-inset-bottom), 16px);
}
/* Prevent elastic/bounce scroll during practice (iOS Safari) */
body.practice-mode {
  overscroll-behavior: none;
}
/* Prevent accidental text selection while tapping cards & buttons */
.card, .arabic-section, .sentence-wrap, .done-card, .topic-card {
  -webkit-user-select: none;
  user-select: none;
}
/* But always allow selecting/pasting into the answer input */
.word-input {

<script>
// ══════════════════════════════════════
//  SUPABASE  CLIENT
// ══════════════════════════════════════
const SUPABASE_URL  = 'https://bnrjtfemuwsuszcquamd.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucmp0ZmVtdXdzdXN6Y3F1YW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NzE1NTMsImV4cCI6MjA5NzU0NzU1M30.B3z36IMRsjKrbugmgiwFjpOdd55Mn0uELqAkxdWUUSY';

// ── Google OAuth ──
async function signInWithGoogle() {

async function signOut() {

}

// ── Fetch / upsert profile ──
async function loadProfile(user) {
  const { data, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (!error && data) { currentProfile = data; return data; }
  // profile created by trigger on first login; retry once
  await new Promise(r => setTimeout(r, 800));
  const { data: d2 } = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = d2;
  return d2;
}

// ── Progress helpers (Supabase) ──
async function loadAllProgress() {
  if (!currentUser) return {};
  const { data } = await sb.from('progress').select('*').eq('user_id', currentUser.id);
  if (!data) return {};
  // reshape into same format as localStorage: { A1: { topic: {done,correct,attempts,lastFrom} } }
  const out = {};
  data.forEach(r => {
    if (!out[r.level]) out[r.level] = {};
    out[r.level][r.topic] = { done: r.done, correct: r.correct, attempts: r.attempts, lastFrom: r.last_from };
  });
  // Cache to localStorage so first render (before Supabase loads) shows real progress
  try { localStorage.setItem('lw_prog_cache', JSON.stringify(out)); } catch(_) {}
  return out;
}

async function upsertProgress(lv, tp, patch) {
  if (!currentUser) return;
  await sb.from('progress').upsert({
    user_id:   currentUser.id,
    level:     lv,
    topic:     tp,
    done:      patch.done      ?? 0,
    correct:   patch.correct   ?? 0,
    attempts:  patch.attempts  ?? 0,
    last_from: patch.lastFrom  ?? 0,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,level,topic' });
}

// ── Notifications ──
async function loadNotifications() {
  if (!currentUser) return [];
  const { data } = await sb.from('notifications')
    .select('*').eq('user_id', currentUser.id)
    .eq('is_read', false)
    .order('created_at', { ascending: false })
    .limit(5);
  return data || [];
}

async function dismissNotification(id) {
  await sb.from('notifications').update({ is_read: true }).eq('id', id);
}

// ── Render user bar ──
function renderUserBar() {
  const p = currentProfile;
  if (!p) return '';
  const initials = (p.username || 'U').slice(0, 2).toUpperCase();
  const avatarHtml = p.avatar_url
    ? `<img class="user-avatar" src="${p.avatar_url}" alt="${p.username}">`
    : `<div class="user-avatar-placeholder">${initials}</div>`;
  const streakTxt = p.streak > 0 ? `🔥 ${p.streak} ${p.streak === 1 ? 'يوم' : 'أيام'}` : 'ابدأ سلسلتك اليوم!';
  return `
    <div class="user-bar">
      <div class="user-bar-left">
        ${avatarHtml}
        <div>
          <div class="user-name">${p.username}</div>
          <div class="user-streak">${streakTxt}</div>
        </div>
      </div>
      <button class="signout-btn" onclick="signOut()">تسجيل الخروج</button>
    </div>`;
}

// ── Render notification cards ──
const NOTIF_ICONS = { streak: '🔥', milestone: '🏆', tip: '💡', reminder: '⏰' };
function renderNotifCards(notifs) {
  if (!notifs.length) return '';
  const cards = notifs.map(n => `
    <div class="notif-card ${n.type}" id="notif-${n.id}">
      <span class="notif-icon">${NOTIF_ICONS[n.type] || '📌'}</span>
      <div class="notif-body">
        <div class="notif-title">${n.title}</div>
        <div class="notif-text">${n.body}</div>
      </div>
      <button class="notif-dismiss" onclick="dismissNotif(${n.id})" title="إغلاق">✕</button>
    </div>`).join('');
  return `<div class="notif-list">${cards}</div>`;
}

async function dismissNotif(id) {
  document.getElementById('notif-' + id)?.remove();
  await dismissNotification(id);
}

// ── Bootstrap: check session on page load ──
let _progressCache = {};   // in-memory cache after load
let _appStarted = false;   // guard: prevent bootApp running twice

async function bootApp(user) {
  if (_appStarted) return;
  _appStarted = true;
  currentUser = user;
  await loadProfile(user);
  _progressCache = await loadAllProgress();
  // Merge any local progress made before sign-in
  mergeLocalToCloud();
  document.getElementById('auth-overlay').style.display = 'none';
  // Run the normal app init
  appInit();
}

async function mergeLocalToCloud() {
  // If localStorage has progress and user is now signed in, push it up
  try {
    const local = JSON.parse(localStorage.getItem('lw_progress') || '{}');
    for (const lv of Object.keys(local)) {
      for (const tp of Object.keys(local[lv])) {
        const rec = local[lv][tp];
        const cloud = (_progressCache[lv] || {})[tp];
        // Only push if local is ahead
        if (!cloud || rec.done > (cloud.done || 0)) {
          await upsertProgress(lv, tp, { done: rec.done, correct: rec.correct, attempts: rec.attempts, lastFrom: rec.lastFrom || 0 });
        }
      }
    }
    localStorage.removeItem('lw_progress');
  } catch (_) {}
}

// ── Override progress functions to use Supabase ──
// These REPLACE the localStorage versions defined later in the script
function getProgress()  { return _progressCache; }
function saveProgress() { /* no-op: we upsert directly */ }

function getTopicProg(lv, tp) {
  return (_progressCache[lv] && _progressCache[lv][tp]) || { done: 0, correct: 0, attempts: 0, lastFrom: 0 };
}

async function saveLastPosition(lv, tp, batchFrom) {
  const cur = getTopicProg(lv, tp);
  if (!_progressCache[lv]) _progressCache[lv] = {};
  _progressCache[lv][tp] = { ...cur, lastFrom: batchFrom };
  await upsertProgress(lv, tp, _progressCache[lv][tp]);
}

function markTopicProgress(lv, tp, batchCorrect, batchAttempts) {
  const cur = getTopicProg(lv, tp);
  const updated = {
    done:      Math.max(cur.done || 0, nextFrom),
    correct:   (cur.correct  || 0) + batchCorrect,
    attempts:  (cur.attempts || 0) + batchAttempts,
    lastFrom:  Math.max(cur.done || 0, nextFrom)
  };
  if (!_progressCache[lv]) _progressCache[lv] = {};
  _progressCache[lv][tp] = updated;
  upsertProgress(lv, tp, updated);
}

// ── Cache helpers (shared with index.html) ──

// ══════════════════════════════════════
//  LOAD LEVEL FROM URL
// ══════════════════════════════════════
const VALID_LEVELS = ['A1','A2','B1','B2','C1','EAP'];
const urlParams = new URLSearchParams(window.location.search);
const urlLevel  = urlParams.get('level') || 'A1';
const level     = VALID_LEVELS.includes(urlLevel) ? urlLevel : 'A1';

const urlFrom   = Math.max(0, parseInt(urlParams.get('from') || '0', 10));
const BATCH     = 10;

// ══════════════════════════════════════
//  PROGRESS SYSTEM  (Supabase — functions defined above in auth block)
//  getLevelProg still needs defining here (reads from _progressCache)
// ══════════════════════════════════════
function getLevelProg(lv) {
  const p = getProgress();
  const topics = getTopics(lv);
  let totalW = 0, doneW = 0;
  topics.forEach(t => {
    const cnt = getWordsByTopic(lv, t).length;
    totalW += cnt;
    doneW  += Math.min((p[lv] && p[lv][t] ? p[lv][t].done : 0), cnt);
  });
  return { done: doneW, total: totalW, pct: totalW ? Math.round(doneW / totalW * 100) : 0 };
}
function getResumeFrom(lv, tp) {
  const tp2 = getTopicProg(lv, tp);
  return Math.max(tp2.lastFrom || 0, tp2.done || 0);
}

// Normalize raw words — slice from urlFrom for batch support
function loadWords(topic) {
  const raw   = topic ? getWordsByTopic(level, topic) : getAllWords(level);
  const batch = raw.slice(urlFrom, urlFrom + BATCH);
  return batch.map(w => ({
    arabic:    w.arabic,
    arabicDef: w.pos ? posLabel(w.pos) : '',
    english:   w.word,
    sentence:  w.sentence
  }));
}

// Total words available for this topic (for progress footer)
const totalTopicWords = urlTopic ? getWordsByTopic(level, urlTopic).length : 0;
const nextFrom        = urlFrom + BATCH;
const remaining       = Math.max(0, totalTopicWords - nextFrom);

const words = urlTopic ? loadWords(urlTopic) : [];

function posLabel(pos) {
  const map = {
    verb: 'فعل', noun: 'اسم', adjective: 'صفة', adverb: 'ظرف',
    preposition: 'حرف جر', conjunction: 'حرف ربط'
  };
  return map[pos] || pos;
}

function showTopicSelector() {
  document.body.classList.remove('practice-mode');
  document.getElementById('scene').innerHTML = '';
  document.getElementById('progress-fill').style.width = '0';
  document.getElementById('counter').textContent = '';

  const topics = getTopics(level);

  // Async: inject user bar + notifications after render
  (async () => {
    const scene = document.getElementById('scene');
    const wrap  = scene.querySelector('.topic-selector-wrap');
    if (!wrap) return;
    // User bar
    const userBarEl = document.createElement('div');
    userBarEl.innerHTML = renderUserBar();
    wrap.insertBefore(userBarEl, wrap.firstChild);
    // Notification cards
    const notifs = await loadNotifications();
    if (notifs.length) {
      const notifEl = document.createElement('div');
      notifEl.innerHTML = renderNotifCards(notifs);
      // Insert after user bar
      wrap.insertBefore(notifEl, wrap.children[1]);
    }
  })();
  const scene  = document.getElementById('scene');

  // Wrapper that sets proper top padding
  const wrap = document.createElement('div');
  wrap.className = 'topic-selector-wrap';

  const lp = getLevelProg(level);
  const header = document.createElement('div');
  header.className = 'topic-header';
  header.innerHTML = `
    <div class="topic-header-label">${level} · اختر موضوعاً</div>
    <div class="topic-header-title">ما الموضوع الذي تريد أن تتدرّب عليه؟</div>
    ${lp.done > 0 ? `
    <div style="margin-top:14px;max-width:360px;margin-left:auto;margin-right:auto;">
      <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-2);margin-bottom:5px;">
        <span>تقدّمك في المستوى ${level}</span>
        <span style="font-weight:700;color:var(--accent)">${lp.pct}%</span>
      </div>
      <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${lp.pct}%;background:linear-gradient(90deg,var(--accent),var(--accent-deep));border-radius:3px;"></div>
      </div>
      <div style="font-size:0.72rem;color:var(--text-3);margin-top:3px;text-align:center;">${lp.done} / ${lp.total} كلمة</div>
    </div>` : ''}
  `;
  wrap.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'topic-grid';

  topics.forEach((topic, i) => {
    const wds    = getWordsByTopic(level, topic);
    const href   = `ListenWrite.html?level=${level}&topic=${encodeURIComponent(topic)}`;
    const emoji  = TOPIC_EMOJIS[topic] || '📌';
    const arName = TOPIC_ARABIC[topic] || topic;
    const num    = String(i + 1).padStart(2, '0');

    // Progress for this topic
    const tp     = getTopicProg(level, topic);
    const tpDone = Math.min(tp.done, wds.length);
    const tpPct  = wds.length ? Math.round(tpDone / wds.length * 100) : 0;
    const isComplete = tpPct >= 100;
    const accPct = tp.attempts > 0 ? Math.round(tp.correct / tp.attempts * 100) : null;

    const progressHtml = `
      <div class="tc-progress">
        <div class="tc-progress-bar">
          <div class="tc-progress-fill" style="width:${tpPct}%;background:${isComplete ? 'var(--success)' : tpPct>0 ? 'var(--accent)' : 'var(--border-2)'};"></div>
        </div>
        <div class="tc-progress-row">
          <span class="tc-pct">${tpPct > 0 ? tpPct+'%'+( isComplete ? ' ✓' : '') : '0%'}</span>
          <span class="tc-words">${tpDone}/${wds.length} كلمة</span>
        </div>
      </div>`;

    // Resume button if there's a saved mid-batch or completed position
    const resumeFrom = getResumeFrom(level, topic);
    const hasResume  = resumeFrom > 0 && resumeFrom < wds.length;
    const resumeHref = `ListenWrite.html?level=${level}&topic=${encodeURIComponent(topic)}&from=${resumeFrom}`;

    const card = document.createElement('div');
    card.className = 'topic-card' + (isComplete ? ' topic-card-done' : '');
    card.style.cursor = 'pointer';
    card.innerHTML = `
      <div class="topic-card-top">
        <span class="topic-emoji">${emoji}</span>
        <span class="topic-order">${num}</span>
      </div>
      <div class="topic-card-ar">${arName}</div>
      <div class="topic-card-en">${topic}</div>
      <div class="topic-card-count">${wds.length} words</div>
      ${progressHtml}
      ${hasResume ? `
        <div class="resume-row">
          <a class="resume-btn" href="${resumeHref}" onclick="event.stopPropagation()">
            ▶ استأنف من كلمة ${resumeFrom + 1}
          </a>
          <a class="restart-link" href="${href}" onclick="event.stopPropagation()">↺</a>
        </div>` : tpDone > 0 && isComplete ? `
        <div class="resume-row">
          <a class="resume-btn complete-btn" href="${href}" onclick="event.stopPropagation()">
            ↺ أعد من البداية
          </a>
        </div>` : ''}
    `;
    card.addEventListener('click', () => {
      window.location.href = hasResume ? resumeHref : href;
    });
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  scene.appendChild(wrap);
}

// ══════════════════════════════════════
//  SOUND EFFECTS  (Web Audio API — no external files)
// ══════════════════════════════════════
let _audioCtx = null;

function _ctx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Resume if suspended (browser autoplay policy)
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

// ✓ Correct — two ascending bell chimes (C5 → E5)
function playCorrectSound() {
  const ctx = _ctx();
  [[523.25, 0], [659.25, 0.13]].forEach(([freq, delay]) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.28, t + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
    osc.start(t);
    osc.stop(t + 0.55);
  });
}

// 🎉 Completion — real applause audio file
function playCompletionSound() {
  try {
    const audio = new Audio('applause.mp3');
    audio.volume = 0.75;
    audio.play().catch(() => {});
    setTimeout(() => {
      audio.pause();
      audio.currentTime = 0;
    }, 3000);
  } catch (_) {}
}

// ✗ Wrong — two short descending buzzes
function playWrongSound() {
  const ctx = _ctx();
  [[220, 0], [180, 0.14]].forEach(([freq, delay]) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    osc.start(t);
    osc.stop(t + 0.12);
  });
}

// ══════════════════════════════════════
//  VOICE SELECTION
//  Accent pref: 'US' or 'GB', stored in localStorage
// ══════════════════════════════════════
let _voiceAccent = localStorage.getItem('lw_accent') || 'US';
let _voiceUS = null;
let _voiceGB = null;
let _voicesReady = false;

function pickVoices() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  _voicesReady = true;

  // ── US ENGLISH priority list ──
  const usTests = [
    v => v.name === 'Google US English',
    v => /Microsoft Aria.*Natural/.test(v.name),
    v => /Microsoft Jenny.*Natural/.test(v.name),
    v => /Microsoft Guy.*Natural/.test(v.name),
    v => /Microsoft Aria/.test(v.name),
    v => /Microsoft Jenny/.test(v.name),
    v => /Microsoft Guy/.test(v.name),
    v => /Microsoft Davis/.test(v.name),
    v => /Microsoft.*Neural.*Online/.test(v.name) && /en[-_]US/i.test(v.lang),
    v => /Microsoft.*Online/.test(v.name) && /en[-_]US/i.test(v.lang),
    v => v.name === 'Samantha' && /en[-_]US/i.test(v.lang),
    v => v.name === 'Alex',
    v => /en[-_]US/i.test(v.lang) && !/compact/i.test(v.name),
    v => /en[-_]US/i.test(v.lang),
    v => /^en/i.test(v.lang),
  ];

  // ── GB ENGLISH priority list ──
  const gbTests = [
    v => v.name === 'Google UK English Female',
    v => v.name === 'Google UK English Male',
    v => /Microsoft Libby/.test(v.name),
    v => /Microsoft Hazel/.test(v.name),
    v => /Microsoft Ryan/.test(v.name),
    v => /Microsoft.*Neural.*Online/.test(v.name) && /en[-_]GB/i.test(v.lang),
    v => /Microsoft.*Online/.test(v.name) && /en[-_]GB/i.test(v.lang),
    v => v.name === 'Daniel' && /en[-_]GB/i.test(v.lang),
    v => /en[-_]GB/i.test(v.lang) && !/compact/i.test(v.name),
    v => /en[-_]GB/i.test(v.lang),
    v => /^en/i.test(v.lang),
  ];

  for (const t of usTests) { const m = voices.find(t); if (m) { _voiceUS = m; break; } }
  for (const t of gbTests) { const m = voices.find(t); if (m) { _voiceGB = m; break; } }

  // Update indicator
  _updateAccentBtn();
}

function _getBestVoice() {
  return _voiceAccent === 'GB' ? (_voiceGB || _voiceUS) : (_voiceUS || _voiceGB);
}

function _updateAccentBtn() {
  const btn = document.getElementById('accent-btn');
  if (!btn) return;
  const v = _getBestVoice();
  const label = _voiceAccent === 'GB' ? '🇬🇧' : '🇺🇸';
  btn.textContent = label;
  btn.title = v ? `الصوت: ${v.name}` : 'اختر اللهجة';
}

function toggleAccent() {
  _voiceAccent = _voiceAccent === 'US' ? 'GB' : 'US';
  localStorage.setItem('lw_accent', _voiceAccent);
  _updateAccentBtn();
  // Play word immediately so user hears the new accent
  if (urlTopic && words.length) playWord(false);
}

window.speechSynthesis.onvoiceschanged = pickVoices;
pickVoices(); // try immediately (some browsers are sync)

// ══════════════════════════════════════
//  SPEECH
//  Chrome bug: cancel() then speak() immediately can glitch.
//  Fix: 80ms gap after cancel(), resume() if paused.
//  Modes:
//    playWord(false) → normal speed  (auto-play + key 1)
//    playWord(true)  → slow  0.58x   (key 2)
//    playSentence()  → full sentence  (key 3)
// ══════════════════════════════════════
let _speechTimer = null;

function _doSpeak(text, rate) {
  if (_speechTimer) clearTimeout(_speechTimer);
  window.speechSynthesis.cancel();

  const btn = document.getElementById('speaker-btn');
  if (btn) btn.classList.remove('playing');

  _speechTimer = setTimeout(() => {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    if (!_voicesReady) pickVoices();

    const voice = _getBestVoice();
    const u = new SpeechSynthesisUtterance(text);
    u.lang   = _voiceAccent === 'GB' ? 'en-GB' : 'en-US';
    u.rate   = rate;
    u.pitch  = 1;
    u.volume = 1;
    if (voice) u.voice = voice;

    if (btn) {
      btn.classList.add('playing');
      u.onend   = () => btn.classList.remove('playing');
      u.onerror = () => btn.classList.remove('playing');
    }
    window.speechSynthesis.speak(u);
  }, 80);
}

// ══════════════════════════════════════
//  BACK / SAVE POSITION
// ══════════════════════════════════════
async function goBack() {
  // If current word was just answered correctly (locked=true, animation in progress),
  // save the NEXT word position; otherwise save the current word position
  const savePos = urlFrom + idx + (locked ? 1 : 0);
  if (urlTopic) await saveLastPosition(level, urlTopic, savePos);
  window.speechSynthesis.cancel();
  window.location.href = `ListenWrite.html?level=${level}`;
}

function playWord(slow = false) {
  const word = words[idx]?.english;
  if (!word) return;
  // Slow rate by level: higher level = slightly slower for clarity
  const levelRates = { A1: 0.80, A2: 0.78, B1: 0.75, B2: 0.72, C1: 0.70 };
  const baseRate = levelRates[level] || 0.75;
  _doSpeak(word, slow ? 0.55 : baseRate);
}

function playSentence() {
  const w = words[idx];
  if (!w) return;
  const text = w.sentence.replace(/\{w\}/g, w.english);
  _doSpeak(text, _voiceAccent === 'GB' ? 0.82 : 0.85);
}

function renderCard(animate) {
  ensureCardShell();
  const w = words[idx];
  locked       = false;
  wordWasWrong = false;

  if (level === 'EAP') { renderEAPCard(w, animate); return; }

  document.getElementById('arabic-word').textContent = w.arabic;
  const defEl = document.getElementById('arabic-def');
  if (w.arabicDef) {
    defEl.textContent = w.arabicDef;
    defEl.style.display = '';
  } else {
    defEl.style.display = 'none';
  }

  // Build inline sentence
  const wrap  = document.getElementById('sentence-wrap');
  const parts = w.sentence.split('{w}');
  wrap.innerHTML = '';

  if (parts[0]) {
    const s = document.createElement('span');
    s.textContent = parts[0];
    wrap.appendChild(s);
  }

  inputEl = document.createElement('input');
  inputEl.type        = 'text';
  inputEl.className   = 'word-input';
  inputEl.autocomplete = 'off';
  inputEl.spellcheck  = false;
  inputEl.setAttribute('autocorrect', 'off');
  inputEl.setAttribute('autocapitalize', 'off');
  // width proportional to word length
  inputEl.style.width = (Math.max(w.english.length, 5) * 11 + 24) + 'px';
  inputEl.placeholder = '_ _ _';
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });
  // Auto-submit on mobile: check the answer the moment it exactly matches
  // the correct word (no need to press Enter/Return on touch keyboards).
  inputEl.addEventListener('input', () => {
    if (locked || !inputEl) return;
    const typed   = inputEl.value.trim().toLowerCase();
    const correct = words[idx].english.toLowerCase();
    if (typed === correct) checkAnswer();
  });
  // Re-focus immediately if input loses focus (keeps typing always ready)
  inputEl.addEventListener('blur', () => {
    if (!locked) setTimeout(() => inputEl && inputEl.focus(), 0);
  });
  wrap.appendChild(inputEl);

  if (parts[1]) {
    const s = document.createElement('span');
    s.textContent = parts[1];
    wrap.appendChild(s);
  }

  // Reset feedback
  wrongAttempts = 0;
  const hint = document.getElementById('correct-word-hint');
  hint.classList.add('hidden');
  hint.innerHTML = '';
  setStatus('hint', 'اكتب الكلمة للتحقق');

  // Progress
  const pct = (idx / words.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('counter').textContent = `${idx + 1} / ${words.length}`;

  if (animate) {
    const card = document.getElementById('card');
    card.classList.remove('exit');
    void card.offsetWidth; // reflow
    card.classList.add('enter');
    setTimeout(() => card.classList.remove('enter'), 400);
  }

  // Sync accent button flag
  _updateAccentBtn();

  // Auto-play word, then focus input
  setTimeout(() => {
    playWord(false);
    setTimeout(() => inputEl && inputEl.focus(), 280);
  }, 150);
}

function renderEAPCard(w, animate) {
  locked       = false;
  wordWasWrong = false;

  // Arabic meaning at top
  document.getElementById('arabic-word').textContent = w.arabic;
  document.getElementById('arabic-def').style.display = 'none';

  // Build full sentence with ghost + highlighted phrase
  const parts  = w.sentence.split('{w}');
  const before = parts[0] || '';
  const after  = parts[1] || '';

  const wrap = document.getElementById('sentence-wrap');
  wrap.innerHTML = '';
  wrap.className = 'sentence-wrap eap-sentence';

  if (before) {
    const s = document.createElement('span');
    s.textContent = before;
    s.className = 'eap-ghost';
    wrap.appendChild(s);
  }
  const ph = document.createElement('span');
  ph.textContent = w.english;
  ph.className   = 'eap-phrase-hl';
  wrap.appendChild(ph);
  if (after) {
    const s = document.createElement('span');
    s.textContent = after;
    s.className = 'eap-ghost';
    wrap.appendChild(s);
  }

  // Remove old input wrap if re-rendering
  const oldWrap = document.getElementById('eap-input-wrap');
  if (oldWrap) oldWrap.remove();

  // Input row BELOW sentence
  const inputWrap = document.createElement('div');
  inputWrap.className = 'eap-input-wrap';
  inputWrap.id        = 'eap-input-wrap';
  wrap.after(inputWrap);

  inputEl = document.createElement('input');
  inputEl.type      = 'text';
  inputEl.className = 'word-input';
  inputEl.autocomplete = 'off';
  inputEl.spellcheck   = false;
  inputEl.setAttribute('autocorrect',   'off');
  inputEl.setAttribute('autocapitalize','off');
  inputEl.placeholder = 'اكتب العبارة…';
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });
  inputEl.addEventListener('input', () => {
    if (locked || !inputEl) return;
    if (inputEl.value.trim().toLowerCase() === words[idx].english.toLowerCase()) checkAnswer();
  });
  inputEl.addEventListener('blur', () => {
    if (!locked) setTimeout(() => inputEl && inputEl.focus(), 0);
  });
  inputWrap.appendChild(inputEl);

  // Reset feedback
  wrongAttempts = 0;
  const hint = document.getElementById('correct-word-hint');
  hint.classList.add('hidden');
  hint.innerHTML = '';
  setStatus('hint', 'اكتب العبارة للتحقق');

  // Progress
  const pct = (idx / words.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('counter').textContent = `${idx + 1} / ${words.length}`;

  if (animate) {
    const card = document.getElementById('card');
    card.classList.remove('exit');
    void card.offsetWidth;
    card.classList.add('enter');
    setTimeout(() => card.classList.remove('enter'), 400);
  }

  _updateAccentBtn();
  setTimeout(() => inputEl && inputEl.focus(), 200);
}

// ══════════════════════════════════════
//  CHECK ANSWER
// ══════════════════════════════════════
function checkAnswer() {
  if (locked || !inputEl) return;
  const typed   = inputEl.value.trim().toLowerCase();
  const correct = words[idx].english.toLowerCase();
  if (!typed) return;

  if (typed === correct) {
    // ✓ Correct
    locked = true;
    if (!wordWasWrong) sessionCorrect++;   // count only first-try correct
    playCorrectSound();
    inputEl.classList.remove('wrong');
    inputEl.classList.add('correct');
    inputEl.disabled = true;
    document.getElementById('correct-word-hint').classList.add('hidden');
    setStatus('success', '✓ ممتاز!');

    setTimeout(() => advance(), 1200);

  } else {
    // ✗ Wrong
    wordWasWrong = true;
    wrongAttempts++;
    playWrongSound();
    inputEl.classList.remove('correct');
    inputEl.classList.add('wrong');

    const hint = document.getElementById('correct-word-hint');

    if (wrongAttempts >= 3) {
      // After 3 wrong attempts: reveal the word, let them type it to proceed
      hint.innerHTML = `اكتب هذه الكلمة: <strong>${words[idx].english}</strong>`;
      hint.classList.remove('hidden');
      setStatus('error', `✗ اكتب الكلمة الصحيحة للمتابعة`);
    } else {
      // 1st or 2nd wrong: just shake, no hint
      const remaining = 3 - wrongAttempts;
      setStatus('error', `✗ حاول مرة أخرى — ${remaining} ${remaining === 1 ? 'محاولة' : 'محاولات'} متبقية`);
    }

    // Clear input and re-focus
    setTimeout(() => {
      if (!inputEl || locked) return;
      inputEl.value = '';
      inputEl.classList.remove('wrong');
      inputEl.focus();
      if (wrongAttempts < 3) setStatus('hint', 'اكتب الكلمة للتحقق');
    }, 1000);
  }
}

// ══════════════════════════════════════
//  ADVANCE TO NEXT
// ══════════════════════════════════════
function advance() {
  const card = document.getElementById('card');

  if (idx >= words.length - 1) {
    card.classList.add('exit');
    setTimeout(showDone, 300);
    return;
  }

  card.classList.add('exit');
  setTimeout(() => {
    idx++;
    card.classList.remove('exit');
    renderCard(true);
  }, 280);
}

// ══════════════════════════════════════
//  STATUS
// ══════════════════════════════════════
function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + (
    type === 'success' ? 'success-msg' :
    type === 'error'   ? 'error-msg'   : 'hint-msg'
  );
  el.textContent = msg;
}

// ══════════════════════════════════════
//  COMPLETION
// ══════════════════════════════════════
function showDone() {
  playCompletionSound();
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('counter').textContent = '';

  // On results screen, top-left back button returns to home
  const backLink = document.querySelector('.back-link');
  if (backLink) {
    backLink.href = 'index.html';
    backLink.textContent = '← الرئيسية';
  }

  // Save progress to localStorage
  if (urlTopic) markTopicProgress(level, urlTopic, sessionCorrect, words.length);

  const topicLabel   = urlTopic ? decodeURIComponent(urlTopic) : '';
  const doneCount    = urlFrom + words.length;
  const continueHref = `ListenWrite.html?level=${level}&topic=${encodeURIComponent(urlTopic)}&from=${nextFrom}`;
  const chooseHref   = `ListenWrite.html?level=${level}`;

  // Accuracy for this batch
  const accuracyPct  = words.length ? Math.round(sessionCorrect / words.length * 100) : 0;
  const accuracyColor = accuracyPct >= 80 ? 'var(--success)' : accuracyPct >= 50 ? '#b8923a' : 'var(--error)';
  const accuracyBar = `
    <div style="margin:16px auto 0;max-width:260px;">
      <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text-2);margin-bottom:5px;">
        <span>دقة هذه الجلسة</span>
        <span style="font-weight:700;color:${accuracyColor}">${accuracyPct}%</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${accuracyPct}%;background:${accuracyColor};border-radius:3px;transition:width 0.8s ease;"></div>
      </div>
      <div style="font-size:0.74rem;color:var(--text-3);margin-top:4px;text-align:right;">
        ${sessionCorrect} / ${words.length} من أول محاولة
      </div>
    </div>`;

  // Topic-level cumulative progress
  const tp     = getTopicProg(level, urlTopic);
  const tpDone = Math.min(tp.done, totalTopicWords);
  const tpPct  = totalTopicWords ? Math.round(tpDone / totalTopicWords * 100) : 0;
  const topicBar = urlTopic ? `
    <div style="margin:14px auto 0;max-width:260px;">
      <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text-2);margin-bottom:5px;">
        <span>إجمالي الموضوع</span>
        <span style="font-weight:700;color:var(--accent)">${tpPct}%</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${tpPct}%;background:var(--accent);border-radius:3px;transition:width 0.8s ease 0.2s;"></div>
      </div>
      <div style="font-size:0.74rem;color:var(--text-3);margin-top:4px;text-align:right;">
        ${tpDone} / ${totalTopicWords} كلمة
      </div>
    </div>` : '';

  // Level progress
  const lp = getLevelProg(level);
  const levelBar = `
    <div style="margin:14px auto 0;max-width:260px;">
      <div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--text-2);margin-bottom:5px;">
        <span>تقدّمك في ${level}</span>
        <span style="font-weight:700;color:var(--accent)">${lp.pct}%</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${lp.pct}%;background:linear-gradient(90deg,var(--accent),var(--accent-deep));border-radius:3px;transition:width 0.8s ease 0.4s;"></div>
      </div>
    </div>`;

  const continueBtn = remaining > 0 ? `
    <a class="btn-restart" href="${continueHref}"
       style="box-shadow:0 6px 22px ${col.shadow}">
      تابع ← ${remaining} كلمة
    </a>` : '';

  const completedMsg = remaining === 0
    ? `<div class="done-sub" style="color:var(--success);font-weight:600;margin-bottom:4px;">🎉 أتممت كل كلمات هذا الموضوع!</div>`
    : `<div class="done-sub">${doneCount} / ${totalTopicWords} كلمة أنجزت</div>`;

  document.getElementById('scene').innerHTML = `
    <div class="done-card">
      <div class="done-icon">🌿</div>
      <div class="done-title">أحسنت!</div>
      <div class="done-sub-en">Well done — <em>${topicLabel}</em></div>
      ${completedMsg}
      ${accuracyBar}
      ${topicBar}
      ${levelBar}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:28px;">
        ${continueBtn}
        <button class="btn-restart" onclick="restartApp()"
          style="background:var(--bg-2);color:var(--text);box-shadow:none;">
          ↺ &nbsp; أعِد هذه الكلمات
        </button>
        <a class="btn-restart" href="${chooseHref}"
           style="background:var(--bg-2);color:var(--text);box-shadow:none;text-decoration:none;">
          ← موضوع آخر
        </a>
      </div>
    </div>
  `;
}

function restartApp() {
  idx            = 0;
  sessionCorrect = 0;
  wordWasWrong   = false;
  document.body.classList.add('practice-mode');
  document.getElementById('scene').innerHTML = '';
  renderCard(false);
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════

// Global keydown:
//   "1"     → replay word (intercepted before input redirect)
//   anything else → redirect to input so user can type immediately
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    e.preventDefault();
    if (urlTopic) goBack();
    return;
  }
  if (e.key === '1') {
    e.preventDefault();
    if (urlTopic && words.length) playWord(false);
    return;
  }
  if (e.key === '2') {
    e.preventDefault();
    if (urlTopic && words.length) playWord(true);
    return;
  }
  if (e.key === '3') {
    e.preventDefault();
    if (urlTopic && words.length) playSentence();
    return;
  }
  if (inputEl && !locked && document.activeElement !== inputEl) {
    inputEl.focus();
  }
});

// ══════════════════════════════════════
//  INIT — called by bootApp() after auth
// ══════════════════════════════════════
function appInit() {
  if (!urlTopic) {
    showTopicSelector();
  } else if (words.length === 0) {
    // Words didn't load (cache issue) — redirect back to topic selector
    document.getElementById('scene').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;text-align:center;padding:24px;">
        <div style="font-size:2.5rem;">⚠️</div>
        <p style="font-size:1.1rem;color:var(--text-2);">لم يتم تحميل المحتوى بشكل صحيح</p>
        <p style="font-size:0.85rem;color:var(--text-3);">يرجى إعادة تحميل الصفحة أو مسح ذاكرة التخزين المؤقت</p>
        <button onclick="location.reload(true)" style="margin-top:8px;padding:10px 24px;border:none;border-radius:999px;background:var(--accent);color:#fff;font-size:0.9rem;cursor:pointer;">إعادة التحميل</button>
        <a href="index.html" style="font-size:0.85rem;color:var(--accent);">← العودة للقائمة</a>
      </div>`;
  } else {
    document.body.classList.add('practice-mode');
    renderCard(false);
  }
}

// ══════════════════════════════════════
//  STARTUP — cache-first auth
//  Runs LAST so all vars (urlTopic, level…) are defined
// ══════════════════════════════════════
(function startApp() {
  const cached = getCachedUser();

  if (cached) {
    // ── Already logged in: start immediately from localStorage ──
    currentUser = {
      id: cached.id, email: cached.email,
      user_metadata: { full_name: cached.name, avatar_url: cached.avatar }
    };
    currentProfile = { username: cached.name, avatar_url: cached.avatar, streak: 0 };
    _appStarted = true;
    // Pre-load progress from local cache so first render shows real data
    try {
      const cachedProg = JSON.parse(localStorage.getItem('lw_prog_cache') || '{}');
      if (Object.keys(cachedProg).length > 0) _progressCache = cachedProg;
    } catch(_) {}
    document.getElementById('auth-overlay').style.display = 'none';
    appInit();

    // Background: load real Supabase session + progress (silent)
    (async () => {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session?.user) {
          currentUser = session.user;
          const meta  = session.user.user_metadata || {};
          localStorage.setItem(LW_KEY, JSON.stringify({
            id: session.user.id,
            name: meta.full_name || meta.name || session.user.email.split('@')[0],
            email: session.user.email,
            avatar: meta.avatar_url || null
          }));
          const profile = await loadProfile(session.user);
          if (profile) currentProfile = profile;
          _progressCache = await loadAllProgress();
          mergeLocalToCloud();
          if (!urlTopic) showTopicSelector(); // refresh sidebar with real data
        }
      } catch (_) { /* network error — keep using cache, user can continue */ }
    })();

  } else {
    // ── Not logged in → go to login page ──
    window.location.replace('index.html');
  }
})();

// Sign-out event → clear cache + redirect
sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') {
    localStorage.removeItem(LW_KEY);
    window.location.replace('index.html');
  }
});

// ══════════════════════════════════════════════════════════════════
//  iOS / iPadOS Enhancements
// ══════════════════════════════════════════════════════════════════

// ── 1. Register Service Worker (offline + PWA installability) ────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── 2. visualViewport: keep card visible when iOS keyboard opens ──
// iOS Safari resizes the viewport when the keyboard opens, which can
// push the input and card off-screen if the body is too tall.
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const inputEl = document.getElementById('word-input');
    if (inputEl && document.activeElement === inputEl) {
      // Wait one frame so layout has stabilised, then scroll input
      // to the centre of the visible area
      requestAnimationFrame(() => {
        inputEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
      });
    }
  });
}

// ── 3. Swipe right → go back (during active practice) ────────────
// A finger swipe of ≥72px to the right with minimal vertical drift
// triggers the same goBack() as the back button.
{
  let _x0 = 0, _y0 = 0;
  document.addEventListener('touchstart', (e) => {
    _x0 = e.touches[0].clientX;
    _y0 = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    // Only active during practice (card is in DOM) and when a topic exists
    if (!urlTopic || !document.getElementById('card')) return;
    const dx = e.changedTouches[0].clientX - _x0;
    const dy = Math.abs(e.changedTouches[0].clientY - _y0);
    // Swipe right ≥ 72px, vertical drift < 40px → go back
    if (dx > 72 && dy < 40) goBack();
  }, { passive: true });
}

// ── 4. iOS TTS unlock on first user interaction ───────────────────
// iOS Safari silently drops speechSynthesis.speak() until the user
// has interacted with the page. Firing a silent utterance on first
// touch "unlocks" the audio session so subsequent calls work.
document.addEventListener('touchstart', function _iosAudioUnlock() {
  // Create and immediately resume AudioContext on the first user touch.
  // iOS only allows AudioContext to start from a direct gesture — doing it
  // here ensures it's already running before any auto-submit via `input` event.
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_audioCtx.state === 'suspended') {
    _audioCtx.resume().catch(() => {});
  }
  // Warm up speechSynthesis with a zero-length utterance
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    try { window.speechSynthesis.speak(u); } catch (_) {}
  }
  document.removeEventListener('touchstart', _iosAudioUnlock);
}, { once: true, passive: true });

// ── 5. Set inputmode on the answer input for better iOS keyboard ──
// "text" gives the standard keyboard; adding autocorrect="off" and
// spellcheck="false" prevents iOS from autocorrecting English words.
// (renderCard() builds the input each time, so we patch it lazily.)
const _origRenderCard = typeof renderCard === 'function' ? renderCard : null;
// Patch via MutationObserver: whenever the card is (re)inserted,
// tweak the input element attributes for iOS.
{
  const _cardObserver = new MutationObserver(() => {
    const inp = document.getElementById('word-input');
    if (inp && !inp.dataset.iosPatch) {
      inp.setAttribute('inputmode', 'text');
      inp.setAttribute('autocorrect', 'off');
      inp.setAttribute('autocapitalize', 'off');
      inp.setAttribute('spellcheck', 'false');
      // Ensure font-size is ≥ 16px so iOS doesn't auto-zoom
      inp.style.fontSize = inp.style.fontSize || '1rem';
      inp.dataset.iosPatch = '1';
    }
  });
  _cardObserver.observe(document.body, { childList: true, subtree: true });
}
</script>
